<!doctype html>
<meta charset="utf-8" />
<style>
  body { font: 13px/1.4 'Segoe UI', system-ui, sans-serif; margin: 0; color: #242424; }
  h3 { margin: 0 0 12px; font-size: 14px; font-weight: 600; }
  .field { margin-bottom: 10px; }
  label { display: block; font-size: 11px; color: #616161; margin-bottom: 4px; }
  input, select, textarea { width: 100%; padding: 6px 8px; border: 1px solid #d1d1d1; border-radius: 4px; font: inherit; box-sizing: border-box; }
  button { background: #0078d4; color: #fff; border: 0; padding: 8px 16px; border-radius: 4px; cursor: pointer; font: inherit; }
  button:hover { background: #106ebe; }
</style>
<form id="form"></form>
<script>
  const data = window.openai?.widgetData || { title: "Form", fields: [] };
  const f = document.getElementById("form");
  f.innerHTML =
    `<h3>${data.title}</h3>` +
    data.fields.map(field => `
      <div class="field">
        <label for="${field.name}">${field.label || field.name}</label>
        <input id="${field.name}" name="${field.name}"
               type="${field.type || 'text'}"
               value="${field.value || ''}"
               ${field.required ? 'required' : ''} />
      </div>`).join("") +
    `<button type="submit">${data.submitLabel || 'Submit'}</button>`;
  f.onsubmit = e => {
    e.preventDefault();
    const payload = Object.fromEntries(new FormData(f));
    // Send structured input back to the agent
    window.openai?.callTool?.(data.submitTool || "submit", payload);
  };
</script>

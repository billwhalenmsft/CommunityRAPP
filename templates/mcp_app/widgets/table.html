<!doctype html>
<meta charset="utf-8" />
<style>
  body { font: 13px/1.4 'Segoe UI', system-ui, sans-serif; margin: 0; color: #242424; }
  h3 { margin: 0 0 8px; font-size: 14px; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #ebebeb; }
  th { background: #f5f5f5; font-weight: 600; font-size: 12px; }
  tr:hover td { background: #fafafa; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
  .pill.Open, .pill.High { background: #fde7e9; color: #a4262c; }
  .pill.InProgress, .pill.Med { background: #fff4ce; color: #8a6116; }
  .pill.Closed, .pill.Low { background: #dff6dd; color: #107c10; }
</style>
<div id="root"></div>
<script>
  const data = window.openai?.widgetData || { title: "Items", rows: [] };
  const root = document.getElementById("root");
  if (!data.rows?.length) {
    root.innerHTML = `<h3>${data.title}</h3><p>No rows.</p>`;
  } else {
    const cols = Object.keys(data.rows[0]);
    const head = cols.map(c => `<th>${c}</th>`).join("");
    const body = data.rows.map(r =>
      "<tr>" + cols.map(c => {
        const v = r[c] ?? "";
        const cls = String(v).replace(/\s+/g, "");
        return ["status","priority"].includes(c.toLowerCase())
          ? `<td><span class="pill ${cls}">${v}</span></td>`
          : `<td>${v}</td>`;
      }).join("") + "</tr>"
    ).join("");
    root.innerHTML = `<h3>${data.title}</h3><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
  }
</script>

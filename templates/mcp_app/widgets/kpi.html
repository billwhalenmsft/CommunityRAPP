<!doctype html>
<meta charset="utf-8" />
<style>
  body { font: 13px/1.4 'Segoe UI', system-ui, sans-serif; margin: 0; color: #242424; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
  .tile { background: #f5f5f5; border-radius: 6px; padding: 12px; }
  .label { font-size: 11px; color: #616161; text-transform: uppercase; letter-spacing: 0.4px; }
  .value { font-size: 22px; font-weight: 600; margin-top: 4px; color: #0078d4; }
</style>
<div id="root"></div>
<script>
  const data = window.openai?.widgetData || { kpis: [] };
  document.getElementById("root").innerHTML =
    `<div class="grid">` +
    data.kpis.map(k =>
      `<div class="tile"><div class="label">${k.label}</div><div class="value">${k.value}</div></div>`
    ).join("") +
    `</div>`;
</script>

kind: BotDefinition
entity:
  accessControlPolicy: GroupMembership
  authenticationMode: None
  authenticationTrigger: AsNeeded
  configuration: {}
  template: kickStartTemplate-1.0.0

components:
  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Fallback
    parentBotId: a1aa62dd-a23d-f111-bec6-70a8a59a411e
    description: This system topic triggers when the user's utterance does not match any existing topics.
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg6feab6b5
    schemaName: template-content.topic.Fallback
    dialog:
      beginDialog:
        kind: OnUnknownIntent
        id: main
        actions:
          - kind: ConditionGroup
            id: conditionGroup_LktzXw
            conditions:
              - id: conditionItem_tlGIVo
                condition: =System.FallbackCount < 3
                actions:
                  - kind: SendActivity
                    id: sendMessage_QZreqo
                    activity: I'm sorry, I'm not sure how to help with that. Can you try rephrasing?

            elseActions:
              - kind: BeginDialog
                id: 5aXj5M
                dialog: template-content.topic.Escalate

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Thank you
    parentBotId: a1aa62dd-a23d-f111-bec6-70a8a59a411e
    description: This topic triggers when the user says thank you.
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg6feab6b5
    schemaName: template-content.topic.Thankyou
    dialog:
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent:
          displayName: Thank you
          includeInOnSelectIntent: false
          triggerQueries:
            - thanks
            - thank you
            - thanks so much
            - ty

        actions:
          - kind: SendActivity
            id: sendMessage_9iz6v7
            activity: You're welcome.

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: On Error
    parentBotId: a1aa62dd-a23d-f111-bec6-70a8a59a411e
    description: This system topic triggers when the agent encounters an error. When using the test chat pane, the full error description is displayed.
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg6feab6b5
    schemaName: template-content.topic.OnError
    dialog:
      beginDialog:
        kind: OnError
        id: main
        actions:
          - kind: SetVariable
            id: setVariable_timestamp
            variable: init:Topic.CurrentTime
            value: =Text(Now(), DateTimeFormat.UTC)

          - kind: ConditionGroup
            id: condition_1
            conditions:
              - id: bL4wmY
                condition: =System.Conversation.InTestMode = true
                actions:
                  - kind: SendActivity
                    id: sendMessage_XJBYMo
                    activity: |-
                      Error Message: {System.Error.Message}
                      Error Code: {System.Error.Code}
                      Conversation Id: {System.Conversation.Id}
                      Time (UTC): {Topic.CurrentTime}

            elseActions:
              - kind: SendActivity
                id: sendMessage_dZ0gaF
                activity:
                  text:
                    - |-
                      An error has occurred.
                      Error code: {System.Error.Code}
                      Conversation Id: {System.Conversation.Id}
                      Time (UTC): {Topic.CurrentTime}.
                  speak:
                    - An error has occurred, please try again.

          - kind: LogCustomTelemetryEvent
            id: 9KwEAn
            eventName: OnErrorLog
            properties: "={ErrorMessage: System.Error.Message, ErrorCode: System.Error.Code, TimeUTC: Topic.CurrentTime, ConversationId: System.Conversation.Id}"

          - kind: CancelAllDialogs
            id: NW7NyY

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Sign in
    parentBotId: a1aa62dd-a23d-f111-bec6-70a8a59a411e
    description: This system topic triggers when the agent needs to sign in the user or require the user to sign in
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg6feab6b5
    schemaName: template-content.topic.Signin
    dialog:
      beginDialog:
        kind: OnSignIn
        id: main
        actions:
          - kind: ConditionGroup
            id: conditionGroup_ypjGKL
            conditions:
              - id: conditionItem_7XYIIR
                condition: =System.SignInReason = SignInReason.SignInRequired
                actions:
                  - kind: SendActivity
                    id: sendMessage_1jHUNO
                    activity: Hello! To be able to help you, I'll need you to sign in.

          - kind: OAuthInput
            id: gOjhZA
            title: Login
            text: To continue, please login

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Conversation Start
    parentBotId: a1aa62dd-a23d-f111-bec6-70a8a59a411e
    description: This system topic triggers when the agent receives an Activity indicating the beginning of a new conversation. If you do not want the agent to initiate the conversation, disable this topic.
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg6feab6b5
    schemaName: template-content.topic.ConversationStart
    dialog:
      beginDialog:
        kind: OnConversationStart
        id: main
        actions:
          - kind: SendActivity
            id: sendMessage_M0LuhV
            activity:
              text:
                - Hello, I'm {System.Bot.Name}. How can I help?
              speak:
                - Hello and thank you for calling {System.Bot.Name}, powered by generative AI. How may I help you today?

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: End of Conversation
    parentBotId: a1aa62dd-a23d-f111-bec6-70a8a59a411e
    description: |-
      This system topic is only triggered by a redirect action,
      and guides the user through rating their conversation with the agent.
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg6feab6b5
    schemaName: template-content.topic.EndofConversation
    dialog:
      startBehavior: CancelOtherTopics
      beginDialog:
        kind: OnSystemRedirect
        id: main
        actions:
          - kind: Question
            id: 41d42054-d4cb-4e90-b922-2b16b37fe379
            conversationOutcome: ResolvedImplied
            alwaysPrompt: true
            variable: init:Topic.SurveyResponse
            prompt: Did that answer your question?
            entity: BooleanPrebuiltEntity

          - kind: ConditionGroup
            id: condition-0
            conditions:
              - id: condition-0-item-0
                condition: =Topic.SurveyResponse = true
                actions:
                  - kind: CSATQuestion
                    id: csat_1
                    conversationOutcome: ResolvedConfirmed

                  - kind: SendActivity
                    id: sendMessage_8r29O0
                    activity: Thanks for your feedback.

                  - kind: Question
                    id: question_1
                    alwaysPrompt: true
                    variable: init:Topic.Continue
                    prompt: Can I help with anything else?
                    entity: BooleanPrebuiltEntity

                  - kind: ConditionGroup
                    id: condition-1
                    conditions:
                      - id: condition-1-item-0
                        condition: =Topic.Continue = true
                        actions:
                          - kind: SendActivity
                            id: sendMessage_4eOE6h
                            activity: Go ahead. I'm listening.

                    elseActions:
                      - kind: SendActivity
                        id: yHBz55
                        activity: Ok, goodbye.

                      - kind: EndConversation
                        id: jh1GMT

            elseActions:
              - kind: Question
                id: PM68ot
                alwaysPrompt: true
                variable: init:Topic.TryAgain
                prompt: Sorry I wasn't able to help better. Would you like to try again?
                entity: BooleanPrebuiltEntity

              - kind: ConditionGroup
                id: KNxYBf
                conditions:
                  - id: DPveFP
                    condition: =Topic.TryAgain = false
                    actions:
                      - kind: BeginDialog
                        id: cngqi4
                        dialog: template-content.topic.Escalate

                elseActions:
                  - kind: SendActivity
                    id: GrVHEW
                    activity: Go ahead. I'm listening.

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Lesson 3 - A topic with a condition, variables and a pre-built entity
    parentBotId: a1aa62dd-a23d-f111-bec6-70a8a59a411e
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg6feab6b5
    schemaName: template-content.topic.Lesson3Atopicwithaconditionvariablesandaprebuiltentity
    dialog:
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent:
          displayName: Lesson 3 - A topic with a condition, variables and a pre-built entity
          triggerQueries:
            - Buy items
            - Buy online
            - Buy product
            - Purchase item
            - Order product

        actions:
          - kind: SendActivity
            id: Sjghab
            activity: I am happy to help you place your order.

          - kind: Question
            id: eRH3BJ
            alwaysPrompt: false
            variable: init:Topic.State
            prompt: To what state will you be shipping?
            entity: StatePrebuiltEntity

          - kind: ConditionGroup
            id: sEzulE
            conditions:
              - id: pbR5LO
                condition: =Topic.State = "California" || Topic.State = "Washington" || Topic.State = "Oregon"

            elseActions:
              - kind: SendActivity
                id: X7BFUC
                activity: There will be an additional shipping charge of $27.50.

              - kind: Question
                id: 6lyBi8
                alwaysPrompt: false
                variable: init:Topic.ShippingRateAccepted
                prompt: Is that acceptable?
                entity: BooleanPrebuiltEntity

              - kind: ConditionGroup
                id: 9BR57P
                conditions:
                  - id: BW47C4
                    condition: =Topic.ShippingRateAccepted = true

                elseActions:
                  - kind: SendActivity
                    id: LMwySU
                    activity: Thank you and please come again.

                  - kind: BeginDialog
                    id: 26GAbP
                    dialog: template-content.topic.EndofConversation

          - kind: Question
            id: mgz1sJ
            alwaysPrompt: true
            variable: init:Topic.Item
            prompt: What item are you interested in purchasing? We are focused on a few quality items.
            entity:
              kind: EmbeddedEntity
              definition:
                kind: ClosedListEntity
                smartMatchingEnabled: true
                items:
                  - id: Desktop Computer
                    displayName: Desktop Computer

                  - id: Laptop Computer
                    displayName: Laptop Computer

                  - id: Gaming Computer
                    displayName: Gaming Computer

          - kind: ConditionGroup
            id: 0qsIib
            conditions:
              - id: 1WP5jv
                condition: =Topic.Item = 'template-content.topic.Lesson3Atopicwithaconditionvariablesandaprebuiltentity.main.mgz1sJ'.'Desktop Computer'
                actions:
                  - kind: SendActivity
                    id: PjNoWL
                    activity: Great choice for the desktop publisher!

              - id: qI8gc3
                condition: =Topic.Item = 'template-content.topic.Lesson3Atopicwithaconditionvariablesandaprebuiltentity.main.mgz1sJ'.'Laptop Computer'
                actions:
                  - kind: SendActivity
                    id: vj6Vbx
                    activity: Great choice for the on-the-go road warrior!

              - id: d7d1mq
                condition: =Topic.Item = 'template-content.topic.Lesson3Atopicwithaconditionvariablesandaprebuiltentity.main.mgz1sJ'.'Gaming Computer'
                actions:
                  - kind: SendActivity
                    id: 25VVXi
                    activity: Go get 'em tiger! Sudoku helps keep the mind active.

          - kind: SendActivity
            id: L3bEHg
            activity: I am adding {Topic.Item} to your cart.

          - kind: SendActivity
            id: 529q62
            activity: |-
              To complete your order, please go to your cart.

              Thank you!

          - kind: BeginDialog
            id: wn9EyA
            dialog: template-content.topic.EndofConversation

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Escalate
    parentBotId: a1aa62dd-a23d-f111-bec6-70a8a59a411e
    description: |-
      This system topic is triggered when the user indicates they would like to speak to a representative.
      You can configure how the agent will handle human hand-off scenarios in the agent settings.
      If your agent does not handle escalations, this topic should be disabled.
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg6feab6b5
    schemaName: template-content.topic.Escalate
    dialog:
      startBehavior: CancelOtherTopics
      beginDialog:
        kind: OnEscalate
        id: main
        intent:
          displayName: Escalate
          includeInOnSelectIntent: false
          triggerQueries:
            - Talk to representative
            - Talk to a person
            - Talk to someone
            - Call back
            - Call customer service
            - Call me please
            - Call support
            - Call technical support
            - Can a representative call me
            - Can I call
            - Can I get in touch with someone else
            - Can I get real representative support
            - Can I get transferred to a person to call
            - Can I have a call in number Or can I be called
            - Can I have a representative call me
            - Can I schedule a call
            - Can I speak to a representative
            - Can I talk to a human
            - Can I talk to a human assistant
            - Can someone call me
            - Chat with a human
            - Chat with a representative
            - Chat with representative
            - Chat with someone please
            - Connect me to a representative
            - Connect me to a person
            - Could some one contact me by phone
            - Customer agent
            - Customer representative
            - Customer service
            - I need a manager to contact me
            - I need customer service
            - I need help from a person
            - I need to speak with a live argent
            - I need to talk to a specialist please
            - I want to talk to customer service
            - I want to proceed with live support
            - I want to speak with a consultant
            - I want to speak with a live tech
            - I would like to speak with an associate
            - I would like to talk to a technician
            - Talk with tech support member

        actions:
          - kind: SendActivity
            id: sendMessage_s39DCt
            conversationOutcome: Escalated
            activity: |-
              Escalating to a representative is not currently configured for this agent, however this is where the agent could provide information about how to get in touch with someone another way.

              Is there anything else I can help you with?

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Lesson 1 - A simple topic
    parentBotId: a1aa62dd-a23d-f111-bec6-70a8a59a411e
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg6feab6b5
    schemaName: template-content.topic.Lesson1Asimpletopic
    dialog:
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent:
          displayName: Lesson 1 - A simple topic
          triggerQueries:
            - When are you closed
            - When are you open
            - Store hours
            - Daily open hours

        actions:
          - kind: SendActivity
            id: Ystyaa
            activity: I'm happy to help with store hours.

          - kind: SendActivity
            id: 6Jn5pw
            activity: |-
              The Redmond hours are:
              - Mon-Fri: 9am to 6pm
              - Sat: 10am to 4pm
              - Sun: Closed

              The Seattle hours are:
              - Mon-Fri: 9am to 6pm
              - Sat-Sun: 10am to 4pm

          - kind: BeginDialog
            id: Dj0B0N
            dialog: template-content.topic.EndofConversation

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Lesson 2 - A simple topic with a condition and variable
    parentBotId: a1aa62dd-a23d-f111-bec6-70a8a59a411e
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg6feab6b5
    schemaName: template-content.topic.Lesson2Asimpletopicwithaconditionandvariable
    dialog:
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent:
          displayName: Lesson 2 - A simple topic with a condition and variable
          triggerQueries:
            - Find my nearest store
            - Check store location
            - Find a store
            - Find me your nearest location
            - Store near me

        actions:
          - kind: SendActivity
            id: qvduia
            activity: I'd be glad to help find a store near you.

          - kind: Question
            id: LbWwpD
            alwaysPrompt: true
            variable: init:Topic.StoreLocation
            prompt: Which location are you interested in?
            entity:
              kind: EmbeddedEntity
              definition:
                kind: ClosedListEntity
                smartMatchingEnabled: true
                items:
                  - id: Redmond
                    displayName: Redmond

                  - id: Seattle
                    displayName: Seattle

                  - id: Kirkland
                    displayName: Kirkland

          - kind: ConditionGroup
            id: HE6JRU
            conditions:
              - id: 6G9Hhn
                condition: =Topic.StoreLocation = 'template-content.topic.Lesson2Asimpletopicwithaconditionandvariable.main.LbWwpD'.'Redmond'
                actions:
                  - kind: SendActivity
                    id: khIIPE
                    activity: "Check out the Company Store at our Visitor Center. The address is: 4567 Main St., Redmond, 26132."

              - id: dqf7pu
                condition: =Topic.StoreLocation = 'template-content.topic.Lesson2Asimpletopicwithaconditionandvariable.main.LbWwpD'.'Seattle'
                actions:
                  - kind: SendActivity
                    id: X7eulp
                    activity: "Our {Topic.StoreLocation} store is located in the U District in the University Village. The address is: 1234 E. University Village St., Seattle, 34567."

              - id: 1QMrFE
                condition: =Topic.StoreLocation = 'template-content.topic.Lesson2Asimpletopicwithaconditionandvariable.main.LbWwpD'.'Kirkland'
                actions:
                  - kind: SendActivity
                    id: jtQo0O
                    activity: "Our {Topic.StoreLocation} is located in downtown Kirkland. The address is: 1234 Central Way, Kirkland, 98321."

          - kind: BeginDialog
            id: mJXqqY
            dialog: template-content.topic.EndofConversation

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Reset Conversation
    parentBotId: a1aa62dd-a23d-f111-bec6-70a8a59a411e
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg6feab6b5
    schemaName: template-content.topic.ResetConversation
    dialog:
      startBehavior: UseLatestPublishedContentAndCancelOtherTopics
      beginDialog:
        kind: OnSystemRedirect
        id: main
        actions:
          - kind: SendActivity
            id: sendMessage_OPsT1O
            activity: What can I help you with?

          - kind: ClearAllVariables
            id: clearAllVariables_73bTFR
            variables: ConversationScopedVariables

          - kind: CancelAllDialogs
            id: cancelAllDialogs_12Gt21

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Multiple Topics Matched
    parentBotId: a1aa62dd-a23d-f111-bec6-70a8a59a411e
    description: This system topic triggers when the agent matches multiple Topics with the incoming message and needs to clarify which one should be triggered.
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg6feab6b5
    schemaName: template-content.topic.MultipleTopicsMatched
    dialog:
      beginDialog:
        kind: OnSelectIntent
        id: main
        triggerBehavior: Always
        actions:
          - kind: SetVariable
            id: setVariable_M6434i
            variable: init:Topic.IntentOptions
            value: =System.Recognizer.IntentOptions

          - kind: SetTextVariable
            id: setTextVariable_0
            variable: Topic.NoneOfTheseDisplayName
            value: None of these

          - kind: EditTable
            id: sendMessage_g5Ls09
            changeType: Add
            itemsVariable: Topic.IntentOptions
            value: "={ DisplayName: Topic.NoneOfTheseDisplayName, TopicId: \"NoTopic\", TriggerId: \"NoTrigger\", Score: 1.0 }"

          - kind: Question
            id: question_zf2HhP
            interruptionPolicy:
              allowInterruption: false

            alwaysPrompt: true
            variable: System.Recognizer.SelectedIntent
            prompt: "To clarify, did you mean:"
            entity:
              kind: DynamicClosedListEntity
              items: =Topic.IntentOptions

          - kind: ConditionGroup
            id: conditionGroup_60PuXb
            conditions:
              - id: conditionItem_rs7GgM
                condition: =System.Recognizer.SelectedIntent.TopicId = "NoTopic"
                actions:
                  - kind: ReplaceDialog
                    id: YZXRDb
                    dialog: template-content.topic.Fallback

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Greeting
    parentBotId: a1aa62dd-a23d-f111-bec6-70a8a59a411e
    description: This topic is triggered when the user greets the agent.
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg6feab6b5
    schemaName: template-content.topic.Greeting
    dialog:
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent:
          displayName: Greeting
          includeInOnSelectIntent: false
          triggerQueries:
            - Good afternoon
            - Good morning
            - Hello
            - Hey
            - Hi

        actions:
          - kind: SendActivity
            id: sendMessage_abmysR
            activity:
              text:
                - Hello, how can I help you today?
              speak:
                - Hello, <break strength="medium" /> how can I help?

          - kind: CancelAllDialogs
            id: cancelAllDialogs_01At22

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Start Over
    parentBotId: a1aa62dd-a23d-f111-bec6-70a8a59a411e
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg6feab6b5
    schemaName: template-content.topic.StartOver
    dialog:
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent:
          displayName: Start Over
          includeInOnSelectIntent: false
          triggerQueries:
            - let's begin again
            - start over
            - start again
            - restart

        actions:
          - kind: Question
            id: question_zguoVV
            alwaysPrompt: false
            variable: init:Topic.Confirm
            prompt: Are you sure you want to restart the conversation?
            entity: BooleanPrebuiltEntity

          - kind: ConditionGroup
            id: conditionGroup_lvx2zV
            conditions:
              - id: conditionItem_sVQtHa
                condition: =Topic.Confirm = true
                actions:
                  - kind: BeginDialog
                    id: 0YKYsy
                    dialog: template-content.topic.ResetConversation

            elseActions:
              - kind: SendActivity
                id: sendMessage_lk2CyQ
                activity: Ok. Let's carry on.

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Goodbye
    parentBotId: a1aa62dd-a23d-f111-bec6-70a8a59a411e
    description: This topic triggers when the user says goodbye. By default, it does not end the conversation. If you would like to end the conversation when the user says goodbye, you can add an "End of Conversation" action to this topic, or redirect to the "End of Conversation" system topic.
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg6feab6b5
    schemaName: template-content.topic.Goodbye
    dialog:
      startBehavior: CancelOtherTopics
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent:
          displayName: Goodbye
          includeInOnSelectIntent: false
          triggerQueries:
            - Bye
            - Bye for now
            - Bye now
            - Good bye
            - No thank you. Goodbye.
            - See you later

        actions:
          - kind: Question
            id: question_zf2HhP
            variable: Topic.EndConversation
            prompt: Would you like to end our conversation?
            entity: BooleanPrebuiltEntity

          - kind: ConditionGroup
            id: condition_DGc1Wy
            conditions:
              - id: condition_DGc1Wy-item-0
                condition: =Topic.EndConversation = true
                actions:
                  - kind: BeginDialog
                    id: dn94DC
                    dialog: template-content.topic.EndofConversation

              - id: condition_DGc1Wy-item-1
                condition: =Topic.EndConversation = false
                actions:
                  - kind: SendActivity
                    id: sendMessage_LdLhmf
                    activity: Go ahead. I'm listening.
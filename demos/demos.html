<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAPP — Demo Showcase</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #6B2FA0;
      --primary-light: #9168b6;
      --primary-dark: #4f1a6e;
      --secondary: #0078D4;
      --accent: #E3008C;
      --success: #107C10;
      --warning: #FFB900;
      --error: #D13438;
      --gray-10: #FAF9F8;
      --gray-20: #F3F2F1;
      --gray-40: #C8C6C4;
      --gray-60: #605E5C;
      --gray-80: #323130;
      --gray-100: #242424;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1025 0%, #0d1117 50%, #161b22 100%);
      min-height: 100vh;
      color: #e2e8f0;
    }

    /* Header */
    .header {
      background: rgba(26, 16, 37, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 2px solid transparent;
      border-image: linear-gradient(90deg, #6B2FA0, #0078D4, #E3008C) 1;
      padding: 16px 40px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
    }

    .logo-text h1 {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(90deg, #fff, #c4b5d0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-text span {
      font-size: 11px;
      color: var(--gray-60);
      letter-spacing: 0.5px;
    }

    .nav-links {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .nav-links a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 6px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-links a:hover { color: white; background: rgba(255,255,255,0.08); }
    .nav-links a.active { color: white; background: var(--primary); }

    /* Search bar */
    .search-bar {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 40px 0;
    }

    .search-input {
      width: 100%;
      max-width: 500px;
      padding: 10px 16px 10px 40px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: white;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--primary); }
    .search-input::placeholder { color: #64748b; }

    .search-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 500px;
    }

    .search-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-size: 14px;
    }

    /* Container */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 40px 60px;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 48px 0 24px;
    }

    .hero h2 {
      font-size: 38px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 30%, var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 16px;
      color: #94a3b8;
      max-width: 620px;
      margin: 0 auto;
    }

    /* Stats */
    .stats-row {
      display: flex;
      justify-content: center;
      gap: 48px;
      margin: 32px 0 36px;
    }

    .stat-item { text-align: center; }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary-light), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-label {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Category Tabs */
    .category-tabs {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .category-tab {
      padding: 8px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      font-family: inherit;
    }

    .category-tab:hover { background: rgba(107,47,160,0.2); border-color: var(--primary); color: white; }
    .category-tab.active { background: var(--primary); border-color: var(--primary); color: white; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 80px 0;
      color: #64748b;
    }

    .loading i { font-size: 32px; margin-bottom: 16px; color: var(--primary-light); }
    .loading p { font-size: 14px; }

    /* Grid */
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 24px;
    }

    /* Card */
    .agent-card {
      background: rgba(30, 25, 40, 0.7);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }

    .agent-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(107, 47, 160, 0.15);
      border-color: rgba(107, 47, 160, 0.3);
    }

    .agent-header {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .agent-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      color: white;
    }

    .agent-icon.finance { background: linear-gradient(135deg, #107C10, #2da82d); }
    .agent-icon.sales { background: linear-gradient(135deg, #6B2FA0, #9168b6); }
    .agent-icon.customer-service { background: linear-gradient(135deg, #0078D4, #2899F5); }
    .agent-icon.healthcare { background: linear-gradient(135deg, #E3008C, #f06ec0); }
    .agent-icon.operations { background: linear-gradient(135deg, #FFB900, #ffd54f); color: #333; }
    .agent-icon.it { background: linear-gradient(135deg, #605E5C, #94a3b8); }
    .agent-icon.core { background: linear-gradient(135deg, #6B2FA0, #9168b6); }
    .agent-icon.general { background: linear-gradient(135deg, #0078D4, #6B2FA0); }

    .agent-info h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .agent-category {
      font-size: 11px;
      color: var(--primary-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .agent-description {
      padding: 12px 24px;
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.6;
    }

    /* Metrics */
    .agent-metrics {
      padding: 12px 24px;
      display: flex;
      gap: 20px;
    }

    .metric { text-align: center; }
    .metric-value { font-size: 18px; font-weight: 600; color: white; }
    .metric-label { font-size: 10px; color: #64748b; text-transform: uppercase; }

    /* Conversation preview */
    .demo-section {
      padding: 12px 24px 16px;
    }

    .demo-section h4 {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .demo-conversation {
      background: rgba(0,0,0,0.25);
      border-radius: 8px;
      padding: 14px;
      font-size: 12px;
      max-height: 220px;
      overflow-y: auto;
    }

    .demo-step {
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .demo-step:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

    .demo-step-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      color: #64748b;
    }

    .demo-step-user {
      color: var(--primary-light);
      font-weight: 500;
      margin-bottom: 6px;
    }

    .demo-step-agent {
      color: #94a3b8;
      line-height: 1.5;
      white-space: pre-line;
      max-height: 80px;
      overflow: hidden;
      position: relative;
    }

    .demo-step-agent::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24px;
      background: linear-gradient(transparent, rgba(0,0,0,0.4));
    }

    /* Trigger phrases */
    .trigger-phrases {
      padding: 8px 24px 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .trigger-tag {
      padding: 3px 8px;
      background: rgba(107,47,160,0.15);
      border: 1px solid rgba(107,47,160,0.25);
      border-radius: 10px;
      font-size: 10px;
      color: #c4b5d0;
    }

    /* Footer */
    .agent-footer {
      padding: 14px 24px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--primary);
      border: none;
      color: white;
    }

    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }

    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: #cbd5e1;
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.08); }

    .btn-accent {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      color: white;
    }

    .btn-accent:hover { opacity: 0.9; transform: translateY(-1px); }

    /* Expand/collapse */
    .demo-expand-btn {
      background: none;
      border: none;
      color: var(--primary-light);
      font-size: 11px;
      cursor: pointer;
      padding: 4px 0;
      font-family: inherit;
    }

    .demo-expand-btn:hover { color: white; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.15); }
    ::-webkit-scrollbar-thumb { background: #4a4458; border-radius: 3px; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #64748b;
    }

    .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
    .empty-state p { font-size: 16px; }

    /* Responsive */
    @media (max-width: 768px) {
      .header { padding: 12px 16px; }
      .container, .search-bar { padding-left: 16px; padding-right: 16px; }
      .hero h2 { font-size: 28px; }
      .agents-grid { grid-template-columns: 1fr; }
      .stats-row { gap: 24px; }
      .stat-value { font-size: 24px; }
      .nav-links { gap: 8px; }
      .nav-links a { font-size: 12px; padding: 4px 8px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon"><i class="fas fa-play-circle"></i></div>
        <div class="logo-text">
          <h1>RAPP Demo Showcase</h1>
          <span>Enterprise AI Agent Library</span>
        </div>
      </div>
      <nav class="nav-links">
        <a href="../index.html"><i class="fas fa-comments"></i> Chat</a>
        <a href="#" class="active"><i class="fas fa-play-circle"></i> Demos</a>
      </nav>
    </div>
  </header>

  <div class="search-bar">
    <div class="search-wrapper">
      <i class="fas fa-search"></i>
      <input type="text" class="search-input" id="search-input" placeholder="Search demos by name, category, or description...">
    </div>
  </div>

  <div class="container">
    <section class="hero">
      <h2>Agent Demo Showcase</h2>
      <p>Explore our library of enterprise AI agents with interactive demos. Click <strong>Play in RAPP</strong> to run any demo step-by-step in the chat UI.</p>
    </section>

    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-value" id="total-agents">—</div>
        <div class="stat-label">Agents</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="total-steps">—</div>
        <div class="stat-label">Demo Steps</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="total-categories">—</div>
        <div class="stat-label">Categories</div>
      </div>
    </div>

    <div class="category-tabs" id="category-tabs">
      <button class="category-tab active" data-category="all">All</button>
    </div>

    <div id="agents-grid" class="agents-grid">
      <div class="loading">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Loading demos from JSON files...</p>
      </div>
    </div>
  </div>

  <script>
    const categoryLabels = {
      'all': 'All', 'core': 'Core', 'finance': 'Finance', 'sales': 'Sales',
      'customer-service': 'Customer Service', 'healthcare': 'Healthcare',
      'operations': 'Operations', 'it': 'IT/Support', 'general': 'General',
      'migration': 'Migration', 'development': 'Development'
    };

    let allDemos = [];
    let activeCategory = 'all';

    // Hardcoded fallback list (used when fetch fails, e.g. file:// protocol)
    const KNOWN_DEMO_FILES = [
      'account_intelligence_agent.json',
      'agent_generator_agent.json',
      'agent_transpiler_agent.json',
      'artist_contract_intelligence_assistant_agent.json',
      'call_center_agent.json',
      'context_memory_agent.json',
      'copilot_studio_transpiler_agent.json',
      'customer_360_agent.json',
      'cx_account_intel_agent.json',
      'cx_customization_converter_agent.json',
      'cx_end_to_end_migration_demo.json',
      'cx_migration_engine_agent.json',
      'cx_sales_pipeline_agent.json',
      'd365_digital_twin_demo.json',
      'd365_sync_guardian_demo.json',
      'fraud_detection_agent.json',
      'github_agent_library_manager.json',
      'hacker_news_agent.json',
      'inventory_visibility_agent.json',
      'it_ticket_agent.json',
      'manage_memory_agent.json',
      'patient_intake_agent.json',
      'project_tracker_agent.json',
      'rapp_code_generator_agent.json',
      'rapp_discovery_agent.json',
      'rapp_mvp_generator_agent.json',
      'rapp_pipeline_agent.json',
      'rapp_quality_gate_agent.json',
      'sales_coach_agent.json',
      'scripted_demo_agent.json',
      'sma4_workbench_orchestrator_agent.json',
      'social_media_manager_agent.json',
      'trade_reconciliation_agent.json'
    ];

    async function getDemoFileList() {
      try {
        const resp = await fetch('demo_manifest.json');
        if (resp.ok) return await resp.json();
      } catch (e) { /* manifest fetch failed */ }
      return KNOWN_DEMO_FILES;
    }

    // fetch wrapper that works on both http:// and file:// protocols
    function fetchJSON(url) {
      return new Promise((resolve, reject) => {
        // Try fetch first (works on http://)
        if (window.location.protocol !== 'file:') {
          fetch(url).then(r => { if (r.ok) return r.json(); throw new Error('not ok'); })
            .then(resolve).catch(reject);
          return;
        }
        // Fallback: XMLHttpRequest (works on file:// in most browsers)
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.onload = function () {
          if (xhr.status === 0 || xhr.status === 200) {
            try { resolve(JSON.parse(xhr.responseText)); }
            catch (e) { reject(e); }
          } else { reject(new Error(xhr.statusText)); }
        };
        xhr.onerror = function () { reject(new Error('XHR error')); };
        xhr.send();
      });
    }

    async function loadAllDemos() {
      const grid = document.getElementById('agents-grid');
      const fileList = await getDemoFileList();

      const loaded = [];
      const results = await Promise.allSettled(fileList.map(async (file) => {
        try {
          const data = await fetchJSON(file);
          if (data.conversation_flow && data.conversation_flow.length > 0) {
            loaded.push({ _filename: file, ...data });
          }
        } catch (e) { /* skip unloadable files */ }
      }));

      if (loaded.length === 0) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Could not load demo JSON files.<br><small>Try opening via a local web server instead of file://</small></p></div>';
        return;
      }

      allDemos = loaded.sort((a, b) => {
        const nameA = a.demo_name || a.agent?.name || a._filename;
        const nameB = b.demo_name || b.agent?.name || b._filename;
        return nameA.localeCompare(nameB);
      });

      buildCategoryTabs();
      updateStats();
      renderGrid();
    }

    function buildCategoryTabs() {
      const cats = new Set();
      allDemos.forEach(d => cats.add(d.agent?.category || 'general'));
      const tabsEl = document.getElementById('category-tabs');
      tabsEl.innerHTML = '<button class="category-tab active" data-category="all">All</button>';
      [...cats].sort().forEach(cat => {
        const label = categoryLabels[cat] || cat.charAt(0).toUpperCase() + cat.slice(1);
        tabsEl.innerHTML += `<button class="category-tab" data-category="${esc(cat)}">${esc(label)}</button>`;
      });

      tabsEl.querySelectorAll('.category-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          tabsEl.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          activeCategory = tab.dataset.category;
          renderGrid();
        });
      });
    }

    function updateStats() {
      document.getElementById('total-agents').textContent = allDemos.length;
      const totalSteps = allDemos.reduce((s, d) => s + (d.conversation_flow?.length || 0), 0);
      document.getElementById('total-steps').textContent = totalSteps;
      const cats = new Set(allDemos.map(d => d.agent?.category || 'general'));
      document.getElementById('total-categories').textContent = cats.size;
    }

    function getFilteredDemos() {
      const query = document.getElementById('search-input').value.toLowerCase().trim();
      return allDemos.filter(d => {
        const cat = d.agent?.category || 'general';
        if (activeCategory !== 'all' && cat !== activeCategory) return false;
        if (!query) return true;
        const name = (d.demo_name || d.agent?.name || '').toLowerCase();
        const desc = (d.description || d.agent?.description || '').toLowerCase();
        const triggers = (d.trigger_phrases || []).join(' ').toLowerCase();
        return name.includes(query) || desc.includes(query) || cat.includes(query) || triggers.includes(query);
      });
    }

    function renderGrid() {
      const grid = document.getElementById('agents-grid');
      const demos = getFilteredDemos();

      if (demos.length === 0) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-film"></i><p>No demos match your search</p></div>';
        return;
      }

      grid.innerHTML = demos.map(demo => {
        const name = demo.demo_name || demo.agent?.name || demo._filename.replace('.json', '');
        const desc = demo.description || demo.agent?.description || '';
        const cat = demo.agent?.category || 'general';
        const icon = demo.agent?.icon || 'fa-play-circle';
        const steps = demo.conversation_flow?.length || 0;
        const tokens = demo.agent?.tokens || '—';
        const triggers = demo.trigger_phrases || [];
        const flow = demo.conversation_flow || [];
        const previewSteps = flow.slice(0, 3);
        const fileBase = demo._filename.replace('.json', '');

        return `
          <div class="agent-card">
            <div class="agent-header">
              <div class="agent-icon ${esc(cat)}">
                <i class="fas ${esc(icon)}"></i>
              </div>
              <div class="agent-info">
                <h3>${esc(name)}</h3>
                <div class="agent-category">${esc(categoryLabels[cat] || cat)}</div>
              </div>
            </div>
            <p class="agent-description">${esc(desc)}</p>
            <div class="agent-metrics">
              <div class="metric">
                <div class="metric-value">${steps}</div>
                <div class="metric-label">Steps</div>
              </div>
              <div class="metric">
                <div class="metric-value">${tokens}</div>
                <div class="metric-label">Tokens</div>
              </div>
              ${triggers.length ? `<div class="metric"><div class="metric-value">${triggers.length}</div><div class="metric-label">Triggers</div></div>` : ''}
            </div>
            <div class="demo-section">
              <h4><i class="fas fa-comments"></i> Conversation Preview</h4>
              <div class="demo-conversation" id="conv-${esc(fileBase)}">
                ${previewSteps.map((step, i) => `
                  <div class="demo-step">
                    <div class="demo-step-label">Step ${i + 1}${step.description ? ' — ' + esc(step.description) : ''}</div>
                    <div class="demo-step-user"><i class="fas fa-user"></i> ${esc(step.user_message || '')}</div>
                    <div class="demo-step-agent">${esc(typeof step.agent_response === 'string' ? step.agent_response : JSON.stringify(step.agent_response)).substring(0, 300)}${(typeof step.agent_response === 'string' ? step.agent_response : '').length > 300 ? '...' : ''}</div>
                  </div>
                `).join('')}
                ${flow.length > 3 ? `<div style="text-align:center; padding: 8px;"><button class="demo-expand-btn" onclick="expandConversation(this, '${esc(fileBase)}')">Show all ${flow.length} steps ▾</button></div>` : ''}
              </div>
            </div>
            ${triggers.length ? `
            <div class="trigger-phrases">
              ${triggers.slice(0, 4).map(t => `<span class="trigger-tag">${esc(t)}</span>`).join('')}
              ${triggers.length > 4 ? `<span class="trigger-tag">+${triggers.length - 4} more</span>` : ''}
            </div>` : ''}
            <div class="agent-footer">
              <a href="${esc(demo._filename)}" download class="btn btn-secondary">
                <i class="fas fa-download"></i> JSON
              </a>
              <button class="btn btn-accent" onclick="playInRapp('${esc(demo._filename)}')">
                <i class="fas fa-play"></i> Play in RAPP
              </button>
            </div>
          </div>`;
      }).join('');
    }

    function expandConversation(btn, fileBase) {
      const demo = allDemos.find(d => d._filename.replace('.json', '') === fileBase);
      if (!demo) return;
      const container = document.getElementById('conv-' + fileBase);
      container.style.maxHeight = 'none';
      container.innerHTML = demo.conversation_flow.map((step, i) => `
        <div class="demo-step">
          <div class="demo-step-label">Step ${i + 1}${step.description ? ' — ' + esc(step.description) : ''}</div>
          <div class="demo-step-user"><i class="fas fa-user"></i> ${esc(step.user_message || '')}</div>
          <div class="demo-step-agent" style="max-height:none">${esc(typeof step.agent_response === 'string' ? step.agent_response : JSON.stringify(step.agent_response))}</div>
        </div>
      `).join('') + `<div style="text-align:center; padding: 8px;"><button class="demo-expand-btn" onclick="collapseConversation('${fileBase}')">Show less ▴</button></div>`;
    }

    function collapseConversation(fileBase) {
      renderGrid();
    }

    function playInRapp(filename) {
      const demoId = filename.replace('.json', '');
      window.location.href = '../index.html?demo=' + encodeURIComponent(demoId);
    }

    function esc(str) {
      if (str == null) return '';
      const div = document.createElement('div');
      div.textContent = String(str);
      return div.innerHTML;
    }

    // Search binding
    document.getElementById('search-input').addEventListener('input', () => renderGrid());

    // Init
    loadAllDemos();
  </script>
</body>
</html>

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: python -m unittest tests.test_memory_agents -v

      - name: Check for PII patterns
        run: |
          echo "Scanning for hardcoded credentials and PII..."
          ISSUES=0

          # Check for hardcoded Azure resource names (common patterns)
          if git ls-files | xargs grep -l 'DefaultEndpointsProtocol=https;AccountName=[a-z]' 2>/dev/null | grep -v '.github/workflows'; then
            echo "❌ Found hardcoded connection strings"
            ISSUES=1
          fi

          # Check for API keys
          if git ls-files | xargs grep -lE 'sk-[a-zA-Z0-9]{20,}' 2>/dev/null | grep -v '.github/workflows'; then
            echo "❌ Found potential API keys"
            ISSUES=1
          fi

          # Check for email addresses in code (not docs/attribution)
          if git ls-files -- '*.py' '*.json' | xargs grep -lE '[a-zA-Z0-9._%+-]+@(microsoft|google|amazon|oracle)\.com' 2>/dev/null; then
            echo "❌ Found corporate email addresses in code"
            ISSUES=1
          fi

          if [ "$ISSUES" -eq 0 ]; then
            echo "✅ No PII patterns detected"
          else
            exit 1
          fi

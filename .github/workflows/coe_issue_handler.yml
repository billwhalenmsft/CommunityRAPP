name: CoE Issue Handler

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  # ── Trigger: issue labeled with agent-task ───────────────────────────────
  process-agent-task:
    name: Process agent-task issue
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      (github.event.label.name == 'agent-task' || github.event.label.name == 'process-now') &&
      contains(toJson(github.event.issue.labels), 'mfg-coe')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process issue
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AzureWebJobsStorage: ${{ secrets.AzureWebJobsStorage }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_FILES_SHARE_NAME: ${{ secrets.AZURE_FILES_SHARE_NAME }}
          USE_CLOUD_STORAGE: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COE_REPO: billwhalenmsft/CommunityRAPP-BillWhalen
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python customers/mfg_coe/agents/coe_runner.py \
            --action process_issue \
            --issue ${{ github.event.issue.number }}

      - name: Assign Copilot if tech-solution
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COE_REPO: billwhalenmsft/CommunityRAPP-BillWhalen
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python customers/mfg_coe/agents/coe_runner.py \
            --action assign_copilot \
            --issue ${{ github.event.issue.number }}

  # ── Trigger: Bill comments on a needs-bill issue ─────────────────────────
  process-bill-feedback:
    name: Process Bill's feedback
    if: |
      github.event_name == 'issue_comment' &&
      github.event.action == 'created' &&
      github.event.comment.user.login == 'billwhalenmsft' &&
      contains(toJson(github.event.issue.labels), 'needs-bill') &&
      contains(toJson(github.event.issue.labels), 'mfg-coe')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process Bill's feedback
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AzureWebJobsStorage: ${{ secrets.AzureWebJobsStorage }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_FILES_SHARE_NAME: ${{ secrets.AZURE_FILES_SHARE_NAME }}
          USE_CLOUD_STORAGE: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COE_REPO: billwhalenmsft/CommunityRAPP-BillWhalen
          GITHUB_RUN_ID: ${{ github.run_id }}
          BILL_COMMENT: ${{ github.event.comment.body }}
        run: |
          python customers/mfg_coe/agents/coe_runner.py \
            --action bill_feedback \
            --issue ${{ github.event.issue.number }} \
            --comment "${{ github.event.comment.body }}"

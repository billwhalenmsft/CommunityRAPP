name: Deploy CoE Command Center to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'customers/mfg_coe/web_ui/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          mkdir -p _site
          cp customers/mfg_coe/web_ui/index.html _site/index.html
          # Inject base path for GitHub Pages subfolder
          sed -i 's|<title>Mfg CoE|<title>Mfg CoE Command Center|g' _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

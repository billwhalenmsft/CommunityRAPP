name: CoE Daily Wrap-Up + Community

on:
  schedule:
    # 5:00 PM Central (23:00 UTC weekdays)
    - cron: '0 23 * * 1-5'
    # Community post: 12:00 PM Central (17:00 UTC, Mon/Wed/Fri)
    - cron: '0 17 * * 1,3,5'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: false
        default: 'daily_wrapup'
        type: choice
        options:
          - daily_wrapup
          - idle_check
          - community_engage

jobs:
  daily_wrapup:
    name: Daily Wrap-Up Report
    runs-on: ubuntu-latest
    # Only run at 23:00 UTC or when manually triggered with daily_wrapup
    if: |
      (github.event_name == 'schedule' && contains(github.event.schedule, '0 23')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'daily_wrapup' || github.event.inputs.action == ''))
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily wrap-up
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AzureWebJobsStorage: ${{ secrets.AZURE_WEB_JOBS_STORAGE }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COE_REPO: billwhalenmsft/CommunityRAPP-BillWhalen
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python customers/mfg_coe/agents/coe_runner.py --action daily_wrapup

      - name: Check for team idleness
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AzureWebJobsStorage: ${{ secrets.AZURE_WEB_JOBS_STORAGE }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COE_REPO: billwhalenmsft/CommunityRAPP-BillWhalen
        run: |
          python customers/mfg_coe/agents/coe_runner.py --action idle_check

  community_post:
    name: Community Engagement Post
    runs-on: ubuntu-latest
    # Only run at 17:00 UTC Mon/Wed/Fri or when manually triggered with community_engage
    if: |
      (github.event_name == 'schedule' && contains(github.event.schedule, '0 17')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'community_engage')
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate community post
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AzureWebJobsStorage: ${{ secrets.AZURE_WEB_JOBS_STORAGE }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COE_REPO: billwhalenmsft/CommunityRAPP-BillWhalen
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python customers/mfg_coe/agents/coe_runner.py --action community_engage

name: Deploy CoE Web UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'customers/mfg_coe/web_ui/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build and Deploy CoE Web UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site
          # Copy Web UI as root index
          cp customers/mfg_coe/web_ui/index.html _site/index.html
          # Create a simple redirect from /coe to root
          cat > _site/404.html << 'EOF'
          <!DOCTYPE html>
          <html><head><meta http-equiv="refresh" content="0;url=/CommunityRAPP-BillWhalen/"></head></html>
          EOF
          echo "Site contents:"
          ls -la _site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          commit_message: "deploy: CoE Web UI → GitHub Pages"
          force_orphan: true

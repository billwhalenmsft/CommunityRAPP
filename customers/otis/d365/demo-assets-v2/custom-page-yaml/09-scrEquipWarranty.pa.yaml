                      RGBA(16, 124, 16, 1),
                      RGBA(197, 54, 1, 1)
                  )
              )
            Fill: |-
              =If(
                  IsBlank(varEWSelectedUnit.'Warranty End Date'),
                  RGBA(237, 235, 233, 1),
                  If(
                      DateDiff(Today(), varEWSelectedUnit.'Warranty End Date', TimeUnit.Days) > 0,
                      RGBA(223, 246, 221, 1),
                      RGBA(253, 231, 233, 1)
                  )
              )
            FontWeight: =FontWeight.Bold
            Height: =24
            Size: =10

            Fill: =RGBA(255, 255, 255, 1)
            Height: =38
            HoverFill: =RGBA(0, 78, 140, 0.05)
            OnSelect: |-
              =Patch(
                  'Email Activities',
                  Defaults('Email Activities'),
                  {
                      Subject: "Repair Quote — " & varEWSelectedUnit.'Serial Number (msdyn_name)'
                          & " (" & varEWSelectedUnit.Product.Name & ")",
                      Description: "<html><body style='font-family:Segoe UI,sans-serif;font-size:14px;color:#333'>"
                          & "<p>Thank you for contacting Otis. Your equipment warranty has expired, but we can assist with a repair.</p>"
                          & "<table style='border-collapse:collapse;margin:12px 0'>"
                          & "<tr><td style='padding:4px 12px 4px 0;color:#666'>Unit:</td><td style='padding:4px 0;font-weight:600'>" & varEWSelectedUnit.'Serial Number (msdyn_name)' & "</td></tr>"
                          & "<tr><td style='padding:4px 12px 4px 0;color:#666'>Model:</td><td style='padding:4px 0;font-weight:600'>" & varEWSelectedUnit.Product.Name & "</td></tr>"
                          & "<tr><td style='padding:4px 12px 4px 0;color:#666'>Location:</td><td style='padding:4px 0;font-weight:600'>" & varEWSelectedUnit.'Functional Location'.Name & "</td></tr>"
                          & "<tr><td style='padding:4px 12px 4px 0;color:#666'>Warranty:</td><td style='padding:4px 0;font-weight:600;color:#c53601'>Expired "
                          & Text(varEWSelectedUnit.'Warranty End Date', "dd/mm/yyyy") & "</td></tr>"
                          & "</table>"
                          & "<p><b>Estimated Repair Cost:</b> Time & Materials — engineer will quote on-site.</p>"
                          & "<p>Please reply to approve or contact us with questions.</p>"
                          & "</body></html>"
                  }
              );

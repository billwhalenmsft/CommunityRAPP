# ============================================================
#  EQUIPMENT & WARRANTY MANAGEMENT (scrEquipWarranty)
#  Format: Power Apps pa.yaml SchemaV3
# ============================================================
#
#  Otis-specific equipment & warranty lookup page.
#  On load: shows all units at the customer location
#  (elevators, escalators, moving walkways) with warranty
#  status badges and contract type.
#  Selecting a unit shows detail panel + action buttons.
#
#  Data source: 'Customer Assets' (D365 FS)
#               with fields: Name, 'Asset Tag', Product,
#               'Serial Number (msdyn_name)', Account, 'Contract Type',
#               'Warranty Start Date', 'Warranty End Date',
#               'Functional Location', 'Last Serviced On', Status.
# ============================================================

Screens:
  scrEquipWarranty:
    Properties:
      Fill: =RGBA(250, 250, 250, 1)
      Height: =900
      OnVisible: |-
        =// --- Initialise state ---
        Set(varEWSelectedUnit, Blank());
        Set(varEWActionMsg, "");
        Set(varEWShowActions, false);
        Set(varEWShowClaimForm, false);
        Set(varEWClaimSubmitted, false);
        Set(varEWClaimError, "");
        Set(varEWShowHistory, false);
        Set(varEWSearch, "");
        Clear(colEWClaimHistory);

        // --- Use varDemoSerial from Settings if no caller serial ---
        If(
            (IsBlank(varEWCallerSerial) || varEWCallerSerial = "") &&
            !IsBlank(varDemoSerial) && varDemoSerial <> "",
            Set(varEWCallerSerial, varDemoSerial)
        );

        // --- Parse pipe-delimited Param("recordId") ---
        // Format: "accountId|caseId|accountName|serialNumber"
        // scrHome already parses these into varEWAccountId and
        // varEWCallerSerial. Param() is only available on the
        // initial page load (from the JS side-pane loader), NOT
        // on internal Navigate() calls. So we use the globals
        // set by scrHome as primary, and Param() as fallback
        // (for the rare case where Equipment is the landing screen).
        With(
            { raw: Param("recordId") },
            If(
                !IsBlank(raw),
                With(
                    { segments: Split(raw, "|") },
                    // Segment 1: Account ID
                    If(
                        IsBlank(varEWAccountId) || varEWAccountId = "",
                        Set(
                            varEWAccountId,
                            If(CountRows(segments) >= 1, First(segments).Value, "")
                        )
                    );
                    // Segment 2: Case ID (store for serial lookup)
                    Set(
                        varEWCaseId,
                        If(CountRows(segments) >= 2, Last(FirstN(segments, 2)).Value, "")
                    );
                    // Segment 4: Serial number (from case's productserialnumber)
                    If(
                        IsBlank(varEWCallerSerial) || varEWCallerSerial = "",
                        Set(
                            varEWCallerSerial,
                            If(
                                CountRows(segments) >= 4,
                                Last(FirstN(segments, 4)).Value,
                                ""
                            )
                        )
                    )
                )
            )
        );

        // --- If no serial was passed, look it up from the case record ---
        // Cases store the serial in productserialnumber (e.g. "GEN2-WL-007").
        // This ensures auto-select works even when the JS loader or scrHome
        // didn't pre-parse the serial into segment 4.
        If(
            (IsBlank(varEWCallerSerial) || varEWCallerSerial = "") &&
            !IsBlank(varEWCaseId) && varEWCaseId <> "",
            With(
                { caseRec: LookUp(Cases, Case = GUID(varEWCaseId)) },
                If(
                    !IsBlank(caseRec) && !IsBlank(caseRec.'Serial Number') && caseRec.'Serial Number' <> "",
                    Set(varEWCallerSerial, caseRec.'Serial Number')
                )
            )
        );

        // Fetch all assets/equipment at this account
        If(
            !IsBlank(varEWAccountId),
            ClearCollect(
                colLocationUnits,
                SortByColumns(
                    Filter(
                        'Customer Assets',
                        Account.Account = GUID(varEWAccountId)
                    ),
                    "msdyn_name", SortOrder.Ascending
                )
            ),
            // Fallback: show all assets if no account scoped
            ClearCollect(
                colLocationUnits,
                SortByColumns(
                    'Customer Assets',
                    "msdyn_name", SortOrder.Ascending
                )
            )
        );

        // --- Auto-select unit if serial was passed, from case, or from Settings ---
        If(
            !IsBlank(varEWCallerSerial) && varEWCallerSerial <> "",
            With(
                { matched: LookUp(colLocationUnits, 'Serial Number (msdyn_name)' = varEWCallerSerial) },
                If(
                    !IsBlank(matched),
                    Set(varEWSelectedUnit, matched);
                    Set(varEWShowActions, true);
                    Set(varEWUnitMode, true),
                    // Serial didn't match any asset — keep varEWUnitMode from Settings
                    If(!varEWUnitMode, Set(varEWUnitMode, false))
                )
            )
            // No serial — preserve varEWUnitMode from Settings (don't reset)
        )
      Width: =380
    Children:

      # ──────────────────────────────────────
      #  HEADER
      # ──────────────────────────────────────
      - rectEWBar:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(0, 78, 140, 1)
            Height: =6
            Width: =Parent.Width

      - icoEWIcon:
          Control: Classic/Icon@2.5.0
          Properties:
            Color: =RGBA(0, 78, 140, 1)
            Height: =32
            Icon: =Icon.Lock
            Width: =32
            X: =16
            Y: =18

      - lblEWTitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Bold
            Height: =41
            Size: =20
            Text: ="Equipment"
            Width: =258
            X: =58
            Y: =7

      - lblEWSubtitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =22
            Size: =11
            Text: |-
              =If(
                  CountRows(colLocationUnits) > 0,
                  CountRows(colLocationUnits) & " units at this location",
                  "No equipment found"
              )
            Width: =Parent.Width - 74
            X: =58
            Y: =48

      - btnEWHome:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 120, 212, 1)
            BorderThickness: =1
            Color: =RGBA(0, 120, 212, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Height: =32
            OnSelect: =Navigate(scrHome, ScreenTransition.None)
            Size: =10
            Text: ="Home"
            Width: =52
            X: =Parent.Width - 68
            Y: =22

      - rectEWDivider1:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(237, 235, 233, 1)
            Height: =1
            Width: =Parent.Width - 32
            X: =16
            Y: =78

      # ──────────────────────────────────────
      #  CALLER UNIT BANNER (unit-specific mode)
      #  Shows when case has a serial number linked
      # ──────────────────────────────────────
      - rectCallerBanner:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 78, 140, 0.3)
            BorderThickness: =1
            Fill: =RGBA(0, 78, 140, 0.08)
            Height: =52
            Visible: =varEWUnitMode && !IsBlank(varEWSelectedUnit)
            Width: =Parent.Width - 32
            X: =16
            Y: =84

      - lblCallerIcon:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: =RGBA(0, 78, 140, 1)
            Fill: =RGBA(0, 78, 140, 0.15)
            FontWeight: =FontWeight.Bold
            Height: =32
            Size: =16
            Text: ="T"
            Visible: =varEWUnitMode && !IsBlank(varEWSelectedUnit)
            Width: =32
            X: =24
            Y: =94

      - lblCallerLabel:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(0, 78, 140, 1)
            FontWeight: =FontWeight.Semibold
            Height: =20
            Size: =11
            Text: |-
              ="Calling from: " & varEWSelectedUnit.'Serial Number (msdyn_name)'
            Visible: =varEWUnitMode && !IsBlank(varEWSelectedUnit)
            Width: =Parent.Width - 128
            X: =62
            Y: =87

      - lblCallerDetail:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =18
            Size: =8
            Text: |-
              =varEWSelectedUnit.'Asset Tag'
              & " | " & Concat(varEWSelectedUnit.'Contract Type', Value, ",")
            Visible: =varEWUnitMode && !IsBlank(varEWSelectedUnit)
            Width: =Parent.Width - 72
            X: =62
            Y: =107

      - btnToggleView:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 78, 140, 1)
            BorderThickness: =1
            Color: =RGBA(0, 78, 140, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Height: =28
            HoverFill: =RGBA(0, 78, 140, 0.05)
            OnSelect: |-
              =Set(varEWUnitMode, !varEWUnitMode);
              If(
                  varEWUnitMode && !IsBlank(varEWCallerSerial),
                  With(
                      { matched: LookUp(colLocationUnits, 'Serial Number (msdyn_name)' = varEWCallerSerial) },
                      If(!IsBlank(matched), Set(varEWSelectedUnit, matched); Set(varEWShowActions, true))
                  )
              )
            PressedFill: =RGBA(0, 78, 140, 0.1)
            Size: =9
            Text: =If(varEWUnitMode, "View All " & CountRows(colLocationUnits) & " Units", "Focus on Caller Unit")
            Visible: =!IsBlank(varEWCallerSerial) && varEWCallerSerial <> ""
            Width: =Parent.Width - 32
            X: =16
            Y: |-
              =If(
                  varEWUnitMode && !IsBlank(varEWSelectedUnit),
                  140,
                  84
              )

      # ──────────────────────────────────────
      #  SEARCH BOX
      # ──────────────────────────────────────
      - txtEWSearch:
          Control: Classic/TextInput@2.3.2
          Properties:
            BorderColor: =RGBA(200, 198, 196, 1)
            BorderThickness: =1
            Color: =RGBA(50, 49, 48, 1)
            Default: =""
            Height: =34
            HintText: ="Search by serial, model, or unit type…"
            OnChange: =Set(varEWSearch, Self.Text)
            Size: =11
            Visible: =!varEWUnitMode
            Width: =Parent.Width - 32
            X: =16
            Y: |-
              =If(
                  !IsBlank(varEWCallerSerial) && varEWCallerSerial <> "",
                  118,
                  86
              )

      # ──────────────────────────────────────
      #  EQUIPMENT LIST (scrollable gallery)
      # ──────────────────────────────────────
      - galUnitList:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            BorderColor: =RGBA(237, 235, 233, 1)
            Fill: =RGBA(250, 250, 250, 1)
            Height: |-
              =If(
                  IsBlank(varEWSelectedUnit),
                  Parent.Height - 178,
                  272
              )
            Items: |-
              =If(
                  IsBlank(varEWSearch) || varEWSearch = "",
                  colLocationUnits,
                  Filter(
                      colLocationUnits,
                      varEWSearch in 'Serial Number (msdyn_name)'
                      || varEWSearch in 'Asset Tag'
                  )
              )
            TemplateFill: |-
              =If(
                  ThisItem.'Serial Number (msdyn_name)' = varEWSelectedUnit.'Serial Number (msdyn_name)',
                  RGBA(222, 236, 249, 1),
                  RGBA(255, 255, 255, 1)
              )
            TemplatePadding: =0
            TemplateSize: =90
            Visible: =CountRows(colLocationUnits) > 0 && !varEWUnitMode
            Width: =380
            Y: |-
              =If(
                  !IsBlank(varEWCallerSerial) && varEWCallerSerial <> "",
                  156,
                  126
              )
          Children:
            # ---- row background card ----
            - rectUnitRow:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(237, 235, 233, 1)
                  BorderThickness: =1
                  Fill: |-
                    =If(
                        ThisItem.'Serial Number (msdyn_name)' = varEWSelectedUnit.'Serial Number (msdyn_name)',
                        RGBA(222, 236, 249, 1),
                        RGBA(255, 255, 255, 1)
                    )
                  Height: =86
                  OnSelect: |-
                    =Set(varEWSelectedUnit, ThisItem);
                    Set(varEWShowActions, true);
                    Set(varEWShowClaimForm, false);
                    Set(varEWShowHistory, false);
                    Set(varEWClaimSubmitted, false);
                    Set(varEWActionMsg, "")
                  Width: =379
                  Y: =2

            # ---- colored left accent bar (type indicator) ----
            - rectUnitAccent:
                Control: Rectangle@2.3.0
                Properties:
                  Fill: |-
                    =If(
                        "Escalator" in ThisItem.'Asset Tag', RGBA(16, 124, 16, 1),
                        "Walkway" in ThisItem.'Asset Tag', RGBA(255, 140, 0, 1),
                        RGBA(0, 120, 212, 1)
                    )
                  Height: =82
                  OnSelect: =Select(rectUnitRow)
                  Width: =4
                  X: =2
                  Y: =4

            # ---- type icon with colored background ----
            - lblUnitTypeIcon:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: |-
                    =If(
                        "Escalator" in ThisItem.'Asset Tag', RGBA(16, 124, 16, 1),
                        "Walkway" in ThisItem.'Asset Tag', RGBA(183, 110, 0, 1),
                        RGBA(0, 78, 140, 1)
                    )
                  Fill: |-
                    =If(
                        "Escalator" in ThisItem.'Asset Tag', RGBA(223, 246, 221, 1),
                        "Walkway" in ThisItem.'Asset Tag', RGBA(255, 243, 205, 1),
                        RGBA(222, 236, 249, 1)
                    )
                  FontWeight: =FontWeight.Bold
                  OnSelect: =Select(rectUnitRow)
                  Size: =18
                  Text: |-
                    =If(
                        "Escalator" in ThisItem.'Asset Tag', "↗",
                        "Walkway" in ThisItem.'Asset Tag', "→",
                        "↕"
                    )
                  Width: =40
                  X: =14
                  Y: =24

            # ---- primary: model + type (from Asset Tag) ----
            - lblUnitName:
                Control: Label@2.5.1
                Properties:
                  Color: =RGBA(50, 49, 48, 1)
                  FontWeight: =FontWeight.Semibold
                  Height: =22
                  OnSelect: =Select(rectUnitRow)
                  Size: =9
                  Text: =ThisItem.'Asset Tag'
                  Width: =Parent.Width - 162
                  X: =62
                  Y: =6

            # ---- secondary: unit number + serial + location ----
            - lblUnitSerial:
                Control: Label@2.5.1
                Properties:
                  Color: =RGBA(96, 94, 92, 1)
                  Height: =18
                  OnSelect: =Select(rectUnitRow)
                  Size: =10
                  Text: |-
                    =With(
                        {
                            serial: ThisItem.'Serial Number (msdyn_name)',
                            tag: ThisItem.'Asset Tag'
                        },
                        With(
                            { suffix: IfError(Text(Value(Right(serial, 3)), "#"), Right(serial, 3)) },
                            If(
                                "Elevator" in tag || "Lift" in tag, "Lift #" & suffix,
                                "Escalator" in tag, "Escalator #" & suffix,
                                "Walkway" in tag, "Walkway #" & suffix,
                                "#" & suffix
                            )
                        )
                        & " · " & serial
                        & If(
                            !IsBlank(ThisItem.'Functional Location'),
                            " · " & ThisItem.'Functional Location'.Name,
                            ""
                        )
                    )
                  Width: =Parent.Width - 162
                  X: =62
                  Y: =28

            # ---- tertiary: warranty summary line ----
            - lblUnitWarrLine:
                Control: Label@2.5.1
                Properties:
                  Color: =RGBA(140, 138, 137, 1)
                  Height: =16
                  OnSelect: =Select(rectUnitRow)
                  Size: =9
                  Text: |-
                    =If(
                        !IsBlank(ThisItem.'Warranty End Date'),
                        If(
                            DateDiff(Today(), ThisItem.'Warranty End Date', TimeUnit.Days) > 0,
                            "Active — "
                            & Text(
                                DateDiff(Today(), ThisItem.'Warranty End Date', TimeUnit.Days),
                                "#"
                            )
                            & " days remaining",
                            "Expired "
                            & Text(ThisItem.'Warranty End Date', "dd/mm/yyyy")
                        ),
                        ""
                    )
                  Width: =Parent.Width - 162
                  X: =62
                  Y: =48

            # ---- contract type pill ----
            - lblUnitContract:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: |-
                    =With(
                        { ct: Concat(ThisItem.'Contract Type', Value, ",") },
                        If(
                            "Signature Service Premium" in ct || "HASSLE FREE" in ct, RGBA(255, 255, 255, 1),
                            "Signature Service Plus" in ct || "Silver" in ct, RGBA(255, 255, 255, 1),
                            "Signature Service" in ct || "Gold" in ct, RGBA(255, 255, 255, 1),
                            RGBA(96, 94, 92, 1)
                        )
                    )
                  Fill: |-
                    =With(
                        { ct: Concat(ThisItem.'Contract Type', Value, ",") },
                        If(
                            "Signature Service Premium" in ct || "HASSLE FREE" in ct, RGBA(0, 78, 140, 1),
                            "Signature Service Plus" in ct || "Silver" in ct, RGBA(0, 120, 212, 1),
                            "Signature Service" in ct || "Gold" in ct, RGBA(16, 124, 16, 1),
                            RGBA(237, 235, 233, 1)
                        )
                    )
                  FontWeight: =FontWeight.Semibold
                  Height: =20
                  OnSelect: =Select(rectUnitRow)
                  Size: =8
                  Text: |-
                    =With(
                        { ct: Concat(ThisItem.'Contract Type', Value, ",") },
                        If(
                            "Signature Service Premium" in ct || "HASSLE FREE" in ct, "SIG PREMIUM",
                            "Signature Service Plus" in ct || "Silver" in ct, "SIG PLUS",
                            "Signature Service" in ct || "Gold" in ct, "SIGNATURE",
                            Upper(ct)
                        )
                    )
                  Width: =80
                  X: =268
                  Y: =8

            # ---- warranty status pill ----
            - lblUnitWarrStatus:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: |-
                    =If(
                        IsBlank(ThisItem.'Warranty End Date'),
                        RGBA(97, 96, 96, 1),
                        If(
                            DateDiff(Today(), ThisItem.'Warranty End Date', TimeUnit.Days) > 0,
                            RGBA(16, 124, 16, 1),
                            RGBA(197, 54, 1, 1)
                        )
                    )
                  Fill: |-
                    =If(
                        IsBlank(ThisItem.'Warranty End Date'),
                        RGBA(237, 235, 233, 1),
                        If(
                            DateDiff(Today(), ThisItem.'Warranty End Date', TimeUnit.Days) > 0,
                            RGBA(223, 246, 221, 1),
                            RGBA(253, 231, 233, 1)
                        )
                    )
                  FontWeight: =FontWeight.Bold
                  Height: =20
                  OnSelect: =Select(rectUnitRow)
                  Size: =8
                  Text: |-
                    =If(
                        IsBlank(ThisItem.'Warranty End Date'),
                        "N/A",
                        If(
                            DateDiff(Today(), ThisItem.'Warranty End Date', TimeUnit.Days) > 0,
                            "WARRANTY",
                            "EXPIRED"
                        )
                    )
                  Width: =80
                  X: =268
                  Y: =34

            # ---- bottom separator ----
            - rectUnitSep:
                Control: Rectangle@2.3.0
                Properties:
                  Fill: =RGBA(237, 235, 233, 1)
                  Height: =1
                  Width: =379
                  Y: =85

      # ──────────────────────────────────────
      #  EMPTY STATE
      # ──────────────────────────────────────
      - lblEWEmpty:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: =RGBA(96, 94, 92, 1)
            Height: =60
            Size: =12
            Text: ="No equipment records found for this account.\nEnsure Customer Assets are linked."
            Visible: =CountRows(colLocationUnits) = 0
            Width: =Parent.Width - 32
            X: =16
            Y: =120

      # ──────────────────────────────────────
      #  SELECTED UNIT — DETAIL PANEL
      #  (appears below the compressed gallery)
      # ──────────────────────────────────────
      - rectDetailCard:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 78, 140, 0.3)
            BorderThickness: =1
            Fill: =RGBA(255, 255, 255, 1)
            Height: =370
            Visible: =!IsBlank(varEWSelectedUnit) && !varEWShowClaimForm && !varEWShowHistory
            Width: =Parent.Width - 32
            X: =16
            Y: =If(varEWUnitMode, 172, 402)

      # ---- detail: unit photo (product image or Otis logo fallback) ----
      - imgUnitPhoto:
          Control: Image@2.2.3
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Height: =140
            Image: |-
              =If(
                  !IsBlank(varEWSelectedUnit.Product)
                  && !IsBlank(varEWSelectedUnit.Product.'Entity Image'),
                  varEWSelectedUnit.Product.'Entity Image',
                  'otis-elevators-logo'
              )
            ImagePosition: =ImagePosition.Fit
            Visible: =!IsBlank(varEWSelectedUnit) && !varEWShowClaimForm && !varEWShowHistory
            Width: =Parent.Width - 36
            X: =18
            Y: =If(varEWUnitMode, 178, 408)

      # ---- detail: unit ID ----
      - lblDetIdLbl:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =20
            Size: =10
            Text: ="Unit ID"
            Visible: =!IsBlank(varEWSelectedUnit) && !varEWShowClaimForm && !varEWShowHistory
            Width: =90
            X: =24
            Y: =If(varEWUnitMode, 324, 554)

      - lblDetIdVal:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Semibold
            Height: =20
            Size: =9
            Text: =varEWSelectedUnit.'Asset Tag'
            Visible: =!IsBlank(varEWSelectedUnit) && !varEWShowClaimForm && !varEWShowHistory
            Width: =246
            X: =118
            Y: =If(varEWUnitMode, 324, 554)

      # ---- detail: serial ----
      - lblDetSerialLbl:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =20
            Size: =10
            Text: ="Serial"
            Visible: =!IsBlank(varEWSelectedUnit) && !varEWShowClaimForm && !varEWShowHistory
            Width: =90
            X: =24
            Y: =If(varEWUnitMode, 346, 576)

      - lblDetSerialVal:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Semibold
            Height: =20
            Size: =11
            Text: |-
              =If(
                  IsBlank(varEWSelectedUnit.'Serial Number (msdyn_name)'),
                  "—",
                  varEWSelectedUnit.'Serial Number (msdyn_name)'
              )
            Visible: =!IsBlank(varEWSelectedUnit) && !varEWShowClaimForm && !varEWShowHistory
            Width: =Parent.Width - 148
            X: =118
            Y: =If(varEWUnitMode, 346, 576)

      # ---- detail: product / model ----
      - lblDetModelLbl:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =20
            Size: =10
            Text: ="Model"
            Visible: =!IsBlank(varEWSelectedUnit) && !varEWShowClaimForm && !varEWShowHistory
            Width: =90
            X: =24
            Y: =If(varEWUnitMode, 368, 598)

      - lblDetModelVal:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Semibold
            Height: =20
            Size: =11
            Text: =varEWSelectedUnit.Product.Name
            Visible: =!IsBlank(varEWSelectedUnit) && !varEWShowClaimForm && !varEWShowHistory
            Width: =Parent.Width - 148
            X: =118
            Y: =If(varEWUnitMode, 368, 598)

      # ---- detail: location ----
      - lblDetLocLbl:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =20
            Size: =10
            Text: ="Location"
            Visible: =!IsBlank(varEWSelectedUnit) && !varEWShowClaimForm && !varEWShowHistory
            Width: =90
            X: =24
            Y: =If(varEWUnitMode, 390, 620)

      - lblDetLocVal:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Semibold
            Height: =20
            Size: =11
            Text: |-
              =If(
                  !IsBlank(varEWSelectedUnit.'Functional Location'),
                  varEWSelectedUnit.'Functional Location'.Name,
                  "—"
              )
            Visible: =!IsBlank(varEWSelectedUnit) && !varEWShowClaimForm && !varEWShowHistory
            Width: =Parent.Width - 148
            X: =118
            Y: =If(varEWUnitMode, 390, 620)

      # ---- detail: contract type ----
      - lblDetContractLbl:

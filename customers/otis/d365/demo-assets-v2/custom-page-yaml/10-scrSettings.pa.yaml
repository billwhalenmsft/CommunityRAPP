# ============================================================
#  ADMIN SETTINGS (scrSettings)
#  Format: Power Apps pa.yaml SchemaV3
# ============================================================
#
#  Configuration screen for standalone design & demo use.
#  Allows every toolkit screen to operate without being
#  embedded inside Dynamics 365 (no Param/recordId needed).
#
#  Sections:
#    1. Design Mode toggle (varDesignMode)
#    2. Warranty Workflow Mode (varWarrantyMode)
#    2b. Equipment View Mode (varEWUnitMode)
#    3. Default Brand / Price List (varDefaultBrand)
#    4. Demo Account Override (varEWAccountId)
#    5. Demo Serial Number (varDemoSerial)
#    6. Demo Tracking Data toggle (varDemoTracking)
#    7. Quick Navigation (jump to any screen)
#
#  Add to scrHome OnVisible:
#    Set(varDesignMode, Coalesce(varDesignMode, false));
#    Set(varWarrantyMode, Coalesce(varWarrantyMode, "equipment"));
#    Set(varDefaultBrand, Coalesce(varDefaultBrand, "Zurn"));
#    Set(varDemoSerial, Coalesce(varDemoSerial, ""));
#    Set(varDemoTracking, Coalesce(varDemoTracking, false))
# ============================================================

Screens:
  scrSettings:
    Properties:
      Fill: =RGBA(250, 250, 250, 1)
      Height: =1660
      Width: =380
      OnVisible: |-
        =Set(varDesignMode, Coalesce(varDesignMode, false));
        Set(varWarrantyMode, Coalesce(varWarrantyMode, "equipment"));
        Set(varDefaultBrand, Coalesce(varDefaultBrand, "Zurn"));
        Set(varDemoSerial, Coalesce(varDemoSerial, ""));
        Set(varDemoTracking, Coalesce(varDemoTracking, false));
        Set(varEWUnitMode, Coalesce(varEWUnitMode, false))
    Children:

      # ──────────────────────────────────────
      #  HEADER
      # ──────────────────────────────────────
      - rectSetBar:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(96, 94, 92, 1)
            Height: =6
            Width: =Parent.Width

      - icoSetIcon:
          Control: Classic/Icon@2.5.0
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =32
            Icon: =Icon.Settings
            Width: =32
            X: =16
            Y: =18

      - lblSetTitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Bold
            Height: =41
            Size: =20
            Text: ="Settings"
            Width: =258
            X: =58
            Y: =7

      - lblSetSubtitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =22
            Size: =11
            Text: ="Configure toolkit for standalone design"
            Width: =Parent.Width - 74
            X: =58
            Y: =48

      - btnSetHome:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 120, 212, 1)
            BorderThickness: =1
            Color: =RGBA(0, 120, 212, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Height: =32
            OnSelect: =Navigate(scrHome, ScreenTransition.None)
            Size: =10
            Text: ="Home"
            Width: =52
            X: =Parent.Width - 68
            Y: =22

      - rectSetDivider1:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(237, 235, 233, 1)
            Height: =1
            Width: =Parent.Width - 32
            X: =16
            Y: =78

      # ──────────────────────────────────────
      #  SECTION 1: DESIGN MODE
      #  Master toggle — when ON, screens show
      #  a design banner and can load demo data
      #  collections instead of querying Dataverse.
      # ──────────────────────────────────────
      - lblSecDM:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            FontWeight: =FontWeight.Semibold
            Height: =22
            Size: =11
            Text: ="DESIGN MODE"
            Width: =Parent.Width - 32
            X: =16
            Y: =86

      - lblSecDMDesc:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =28
            Size: =10
            Text: ="When enabled, screens show a design banner and use demo data instead of Dataverse."
            Width: =Parent.Width - 32
            X: =16
            Y: =108

      # ── ON card ──
      - rectDMOn:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: |-
              =If(varDesignMode, RGBA(0, 78, 140, 1), RGBA(237, 235, 233, 1))
            BorderThickness: |-
              =If(varDesignMode, 2, 1)
            Fill: |-
              =If(varDesignMode, RGBA(222, 236, 249, 1), RGBA(255, 255, 255, 1))
            Height: =50
            Width: =170
            X: =16
            Y: =140

      - rectDMOnAccent:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(0, 78, 140, 1)
            Height: =50
            Visible: =varDesignMode
            Width: =4
            X: =16
            Y: =140

      - lblDMOnTitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Bold
            Height: =22
            Size: =12
            Text: ="● Design ON"
            Width: =120
            X: =30
            Y: =154

      - lblDMOnCheck:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: =RGBA(0, 78, 140, 1)
            FontWeight: =FontWeight.Bold
            Height: =22
            Size: =14
            Text: ="✓"
            Visible: =varDesignMode
            Width: =24
            X: =158
            Y: =154

      - btnDMOn:
          Control: Classic/Button@2.2.0
          Properties:
            BorderThickness: =0
            Color: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(0, 0, 0, 0)
            Height: =50
            HoverFill: =RGBA(0, 0, 0, 0.02)
            OnSelect: =Set(varDesignMode, true)
            PressedFill: =RGBA(0, 0, 0, 0.04)
            Text: =""
            Width: =170
            X: =16
            Y: =140

      # ── OFF card ──
      - rectDMOff:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: |-
              =If(!varDesignMode, RGBA(0, 78, 140, 1), RGBA(237, 235, 233, 1))
            BorderThickness: |-
              =If(!varDesignMode, 2, 1)
            Fill: |-
              =If(!varDesignMode, RGBA(222, 236, 249, 1), RGBA(255, 255, 255, 1))
            Height: =50
            Width: =170
            X: =194
            Y: =140

      - rectDMOffAccent:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(0, 78, 140, 1)
            Height: =50
            Visible: =!varDesignMode
            Width: =4
            X: =194
            Y: =140

      - lblDMOffTitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Bold
            Height: =22
            Size: =12
            Text: ="○ Design OFF"
            Width: =120
            X: =208
            Y: =154

      - lblDMOffCheck:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: =RGBA(0, 78, 140, 1)
            FontWeight: =FontWeight.Bold
            Height: =22
            Size: =14
            Text: ="✓"
            Visible: =!varDesignMode
            Width: =24
            X: =336
            Y: =154

      - btnDMOff:
          Control: Classic/Button@2.2.0
          Properties:
            BorderThickness: =0
            Color: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(0, 0, 0, 0)
            Height: =50
            HoverFill: =RGBA(0, 0, 0, 0.02)
            OnSelect: =Set(varDesignMode, false)
            PressedFill: =RGBA(0, 0, 0, 0.04)
            Text: =""
            Width: =170
            X: =194
            Y: =140

      - lblDMStatus:
          Control: Label@2.5.1
          Properties:
            Color: |-
              =If(varDesignMode, RGBA(0, 78, 140, 1), RGBA(96, 94, 92, 1))
            FontWeight: =FontWeight.Semibold
            Height: =20
            Size: =10
            Text: |-
              =If(varDesignMode,
                  "Design mode active — screens use demo data",
                  "Live mode — screens query Dataverse"
              )
            Width: =Parent.Width - 32
            X: =16
            Y: =196

      - rectDMDiv:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(237, 235, 233, 1)
            Height: =1
            Width: =Parent.Width - 32
            X: =16
            Y: =222

      # ──────────────────────────────────────
      #  SECTION 2: WARRANTY WORKFLOW MODE
      # ──────────────────────────────────────
      - lblSecWarranty:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            FontWeight: =FontWeight.Semibold
            Height: =22
            Size: =11
            Text: ="WARRANTY WORKFLOW MODE"
            Width: =Parent.Width - 32
            X: =16
            Y: =230

      - lblSecWarrantyDesc:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =28
            Size: =10
            Text: ="Choose the warranty workflow that matches your customer's process."
            Width: =Parent.Width - 32
            X: =16
            Y: =252

      # ── Option A: Equipment & Warranty ──
      - rectOptEquip:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: |-
              =If(varWarrantyMode = "equipment", RGBA(0, 78, 140, 1), RGBA(237, 235, 233, 1))
            BorderThickness: |-
              =If(varWarrantyMode = "equipment", 2, 1)
            Fill: |-
              =If(varWarrantyMode = "equipment", RGBA(222, 236, 249, 1), RGBA(255, 255, 255, 1))
            Height: =80
            Width: =Parent.Width - 32
            X: =16
            Y: =284

      - rectOptEquipAccent:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(0, 78, 140, 1)
            Height: =80
            Visible: =varWarrantyMode = "equipment"
            Width: =4
            X: =16
            Y: =284

      - icoOptEquip:
          Control: Classic/Icon@2.5.0
          Properties:
            Color: =RGBA(0, 78, 140, 1)
            Height: =24
            Icon: =Icon.Lock
            Width: =24
            X: =32
            Y: =298

      - lblOptEquipTitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Bold
            Height: =22
            Size: =12
            Text: ="Equipment & Warranty"
            Width: =Parent.Width - 100
            X: =64
            Y: =290

      - lblOptEquipDesc:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =28
            Size: =10
            Text: ="Fleet view — all units at account with contract type and warranty status."
            Width: =Parent.Width - 100
            X: =64
            Y: =312

      - lblOptEquipSource:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =16
            Size: =9
            Text: |-
              ="Data: Customer Assets table"
            Width: =Parent.Width - 100
            X: =64
            Y: =340

      - lblOptEquipCheck:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: =RGBA(0, 78, 140, 1)
            FontWeight: =FontWeight.Bold
            Height: =22
            Size: =14
            Text: ="✓"
            Visible: =varWarrantyMode = "equipment"
            Width: =24
            X: =Parent.Width - 48
            Y: =314

      - btnOptEquip:
          Control: Classic/Button@2.2.0
          Properties:
            BorderThickness: =0
            Color: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(0, 0, 0, 0)
            Height: =80
            HoverFill: =RGBA(0, 0, 0, 0.02)
            OnSelect: =Set(varWarrantyMode, "equipment")
            PressedFill: =RGBA(0, 0, 0, 0.04)
            Text: =""
            Width: =Parent.Width - 32
            X: =16
            Y: =284

      # ── Option B: Serial Warranty Lookup ──
      - rectOptSerial:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: |-
              =If(varWarrantyMode = "serial", RGBA(0, 78, 140, 1), RGBA(237, 235, 233, 1))
            BorderThickness: |-
              =If(varWarrantyMode = "serial", 2, 1)
            Fill: |-
              =If(varWarrantyMode = "serial", RGBA(222, 236, 249, 1), RGBA(255, 255, 255, 1))
            Height: =80
            Width: =Parent.Width - 32
            X: =16
            Y: =372

      - rectOptSerialAccent:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(0, 78, 140, 1)
            Height: =80
            Visible: =varWarrantyMode = "serial"
            Width: =4
            X: =16
            Y: =372

      - icoOptSerial:
          Control: Classic/Icon@2.5.0
          Properties:
            Color: =RGBA(0, 78, 140, 1)
            Height: =24
            Icon: =Icon.Search
            Width: =24
            X: =32
            Y: =386

      - lblOptSerialTitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Bold
            Height: =22
            Size: =12
            Text: ="Serial Warranty Lookup"
            Width: =Parent.Width - 100
            X: =64
            Y: =378

      - lblOptSerialDesc:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =28
            Size: =10
            Text: ="Search by serial — look up warranty, product info, and submit claims."
            Width: =Parent.Width - 100
            X: =64
            Y: =400

      - lblOptSerialSource:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =16
            Size: =9
            Text: |-
              ="Data: Product Serials table"
            Width: =Parent.Width - 100
            X: =64
            Y: =428

      - lblOptSerialCheck:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: =RGBA(0, 78, 140, 1)
            FontWeight: =FontWeight.Bold
            Height: =22
            Size: =14
            Text: ="✓"
            Visible: =varWarrantyMode = "serial"
            Width: =24
            X: =Parent.Width - 48
            Y: =402

      - btnOptSerial:
          Control: Classic/Button@2.2.0
          Properties:
            BorderThickness: =0
            Color: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(0, 0, 0, 0)
            Height: =80
            HoverFill: =RGBA(0, 0, 0, 0.02)
            OnSelect: =Set(varWarrantyMode, "serial")
            PressedFill: =RGBA(0, 0, 0, 0.04)
            Text: =""
            Width: =Parent.Width - 32
            X: =16
            Y: =372

      # ── Mode indicator ──
      - lblModeLbl:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =20
            Size: =10
            Text: |-
              ="Active mode:"
            Width: =80
            X: =16
            Y: =458

      - lblModeVal:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(0, 78, 140, 1)
            FontWeight: =FontWeight.Bold
            Height: =20
            Size: =10
            Text: |-
              =If(
                  varWarrantyMode = "equipment",
                  "Equipment & Warranty (fleet view)",
                  "Serial Warranty Lookup (search)"
              )
            Width: =Parent.Width - 108
            X: =100
            Y: =458

      - rectWarrantyDiv:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(237, 235, 233, 1)
            Height: =1
            Width: =Parent.Width - 32
            X: =16
            Y: =486

      # ──────────────────────────────────────
      #  SECTION 2b: EQUIPMENT VIEW MODE
      #  Controls whether the Equipment &
      #  Warranty screen opens in unit-specific
      #  view (caller's elevator) or facility
      #  view (all units at account).
      #  Only relevant when Warranty Mode =
      #  "equipment".
      # ──────────────────────────────────────
      - lblSecUnitMode:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            FontWeight: =FontWeight.Semibold
            Height: =22
            Size: =11
            Text: ="EQUIPMENT VIEW MODE"
            Visible: =varWarrantyMode = "equipment"
            Width: =Parent.Width - 32
            X: =16
            Y: =494

      - lblSecUnitModeDesc:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =28
            Size: =10
            Text: ="Start in unit-specific view (single elevator) or facility view (all units at account)."
            Visible: =varWarrantyMode = "equipment"
            Width: =Parent.Width - 32
            X: =16
            Y: =516

      # ── Unit view card ──
      - rectUMUnit:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: |-
              =If(varEWUnitMode, RGBA(0, 78, 140, 1), RGBA(237, 235, 233, 1))
            BorderThickness: |-
              =If(varEWUnitMode, 2, 1)
            Fill: |-
              =If(varEWUnitMode, RGBA(222, 236, 249, 1), RGBA(255, 255, 255, 1))
            Height: =50
            Visible: =varWarrantyMode = "equipment"
            Width: =170
            X: =16
            Y: =548

      - rectUMUnitAccent:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(0, 78, 140, 1)
            Height: =50
            Visible: =varWarrantyMode = "equipment" && varEWUnitMode
            Width: =4
            X: =16
            Y: =548

      - lblUMUnitTitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Bold
            Height: =22
            Size: =12
            Text: ="● Unit View"
            Visible: =varWarrantyMode = "equipment"
            Width: =120
            X: =30
            Y: =562

      - lblUMUnitCheck:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: =RGBA(0, 78, 140, 1)
            FontWeight: =FontWeight.Bold
            Height: =22
            Size: =14
            Text: ="✓"
            Visible: =varWarrantyMode = "equipment" && varEWUnitMode
            Width: =24
            X: =158
            Y: =562

      - btnUMUnit:
          Control: Classic/Button@2.2.0
          Properties:
            BorderThickness: =0
            Color: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(0, 0, 0, 0)
            Height: =50
            HoverFill: =RGBA(0, 0, 0, 0.02)
            OnSelect: =Set(varEWUnitMode, true)
            PressedFill: =RGBA(0, 0, 0, 0.04)
            Text: =""
            Visible: =varWarrantyMode = "equipment"
            Width: =170
            X: =16
            Y: =548

      # ── Facility view card ──
      - rectUMFacility:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: |-
              =If(!varEWUnitMode, RGBA(0, 78, 140, 1), RGBA(237, 235, 233, 1))
            BorderThickness: |-
              =If(!varEWUnitMode, 2, 1)
            Fill: |-
              =If(!varEWUnitMode, RGBA(222, 236, 249, 1), RGBA(255, 255, 255, 1))
            Height: =50
            Visible: =varWarrantyMode = "equipment"
            Width: =170
            X: =194
            Y: =548

      - rectUMFacilityAccent:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(0, 78, 140, 1)
            Height: =50
            Visible: =varWarrantyMode = "equipment" && !varEWUnitMode
            Width: =4
            X: =194
            Y: =548

      - lblUMFacilityTitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Bold
            Height: =22
            Size: =12
            Text: ="○ Facility View"
            Visible: =varWarrantyMode = "equipment"
            Width: =120
            X: =208
            Y: =562

      - lblUMFacilityCheck:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: =RGBA(0, 78, 140, 1)
            FontWeight: =FontWeight.Bold
            Height: =22
            Size: =14
            Text: ="✓"
            Visible: =varWarrantyMode = "equipment" && !varEWUnitMode
            Width: =24
            X: =336
            Y: =562

      - btnUMFacility:
          Control: Classic/Button@2.2.0
          Properties:
            BorderThickness: =0
            Color: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(0, 0, 0, 0)
            Height: =50
            HoverFill: =RGBA(0, 0, 0, 0.02)
            OnSelect: =Set(varEWUnitMode, false)
            PressedFill: =RGBA(0, 0, 0, 0.04)
            Text: =""
            Visible: =varWarrantyMode = "equipment"
            Width: =170
            X: =194
            Y: =548

      - lblUMStatus:
          Control: Label@2.5.1
          Properties:
            Color: |-
              =If(varEWUnitMode, RGBA(0, 78, 140, 1), RGBA(96, 94, 92, 1))
            FontWeight: =FontWeight.Semibold
            Height: =20
            Size: =10
            Text: |-
              =If(varEWUnitMode,
                  "Unit view — opens to caller's specific elevator",
                  "Facility view — shows all units at account"
              )
            Visible: =varWarrantyMode = "equipment"
            Width: =Parent.Width - 32
            X: =16
            Y: =604

      - rectUnitModeDiv:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(237, 235, 233, 1)
            Height: =1
            Visible: =varWarrantyMode = "equipment"
            Width: =Parent.Width - 32
            X: =16
            Y: =630

      # ──────────────────────────────────────
      #  SECTION 3: DEFAULT BRAND / PRICE LIST
      #  Pre-selects the brand dropdown on
      #  Quick Quote and maps to the correct
      #  Dataverse price list.
      # ──────────────────────────────────────
      - lblSecBrand:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            FontWeight: =FontWeight.Semibold
            Height: =22
            Size: =11
            Text: ="DEFAULT BRAND / PRICE LIST"
            Width: =Parent.Width - 32
            X: =16
            Y: =638

      - lblSecBrandDesc:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =28
            Size: =10
            Text: ="Pre-selects the brand dropdown on Quick Quote. Controls which products and price list are shown."
            Width: =Parent.Width - 32
            X: =16
            Y: =660

      - btnBrandZurn:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: |-
              =If(varDefaultBrand = "Zurn", RGBA(0, 78, 140, 1), RGBA(200, 198, 196, 1))
            BorderThickness: |-
              =If(varDefaultBrand = "Zurn", 2, 1)
            Color: |-
              =If(varDefaultBrand = "Zurn", RGBA(255, 255, 255, 1), RGBA(50, 49, 48, 1))
            Fill: |-
              =If(varDefaultBrand = "Zurn", RGBA(0, 78, 140, 1), RGBA(255, 255, 255, 1))
            Height: =36
            HoverFill: |-
              =If(varDefaultBrand = "Zurn", RGBA(0, 78, 140, 1), RGBA(0, 78, 140, 0.05))
            OnSelect: =Set(varDefaultBrand, "Zurn")
            PressedFill: =RGBA(0, 78, 140, 0.15)
            Size: =11
            Text: ="Zurn"
            Width: =112

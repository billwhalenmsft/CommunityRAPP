# ============================================
#  HOME SCREEN - Service Toolkit (scrHome)
#  Format: Power Apps pa.yaml SchemaV3
# ============================================
#
#  Launcher screen for CSR productivity tools.
#  Paste this screen FIRST, then paste each
#  tool's screens afterward.
# ============================================

Screens:
  scrHome:
    Properties:
      Fill: =RGBA(250, 250, 250, 1)
      OnVisible: |-
        =// Initialize all global variables
        Set(varSelectedOrder, Blank());
        Set(varAgentNotes, "");
        Set(varTimelineAdded, false);
        Set(varShowAddLine, false);
        // Initialize collections with typed schemas so Power Apps
        // can resolve column names on all downstream screens.
        ClearCollect(
            colQtyChanges,
            {
                OrderProduct: GUID("00000000-0000-0000-0000-000000000000"),
                OrigQty: 0,
                NewQty: 0,
                Delta: 0,
                AdjAmount: 0,
                ProductName: "",
                LineNum: 0
            }
        );
        Clear(colQtyChanges);
        ClearCollect(
            colNewLines,
            {
                ProductName: "",
                Qty: 0,
                UnitPrice: 0,
                LineAmount: 0
            }
        );
        Clear(colNewLines);
        ClearCollect(
            colDateChanges,
            {
                LineId: Blank(),
                NewDate: Now()
            }
        );
        Clear(colDateChanges);
        ClearCollect(
            colDatePatchLines,
            {
                LineId: Blank(),
                NewDate: Now()
            }
        );
        Clear(colDatePatchLines);
        // Shipment Tracker variables
        Set(varTrackingResult, Blank());
        Set(varTrackingError, "");
        Set(varTrackingLoading, false);
        ClearCollect(
            colTrackingEvents,
            {
                occurred_at: "",
                description: "",
                city_locality: "",
                state_province: "",
                postal_code: "",
                country_code: "",
                event_code: "",
                status_code: ""
            }
        );
        Clear(colTrackingEvents);
        // Quick Quote variables
        Set(varQuoteBrand, "Zurn");
        Set(varQuoteAccount, Blank());
        Set(varQuoteSaved, false);
        Set(varQuoteError, "");
        Set(varQuoteNumber, "");
        Set(varProductType, "Core Products");
        // varSavedQuote is set by the save Patch on scrQuoteReview;
        // do NOT init with Blank() — Custom Pages cannot type an
        // untyped blank for a record variable.
        Set(varTempPrice, 0);
        ClearCollect(
            colQuoteLines,
            {
                ProductName: "",
                ProductNum: "",
                Qty: 0,
                UnitPrice: 0,
                LineAmount: 0
            }
        );
        Clear(colQuoteLines);
        // Return / RMA variables
        Set(varRMACreated, false);
        Set(varRMANumber, "");
        Set(varRMAError, "");
        // Warranty Lookup variables
        Set(varSerialSearched, false);
        Set(varClaimSubmitted, false);
        Set(varClaimError, "");
        Set(varClaimNumber, "");
        // Parse pipe-delimited Param("recordId") from JS loader
        // Format: "accountId|caseId|accountName|serialNumber"
        With(
            { raw: Param("recordId") },
            If(
                !IsBlank(raw),
                With(
                    { segments: Split(raw, "|") },
                    // Segment 1: Account ID → used by Equipment screen
                    Set(
                        varEWAccountId,
                        If(CountRows(segments) >= 1, First(segments).Value, "")
                    );
                    // Segment 4: Serial from case → used by Equipment screen
                    Set(
                        varPassedSerial,
                        If(
                            CountRows(segments) >= 4,
                            Last(FirstN(segments, 4)).Value,
                            ""
                        )
                    );
                    Set(varEWCallerSerial, varPassedSerial)
                )
            )
        );
        ClearCollect(
            colSerialResult,
            {
                'Product Name': "",
                'Serial ID': "",
                'Warranty Start': Now(),
                'Warranty End': Now(),
                'Original Order Number': ""
            }
        );
        Clear(colSerialResult);
        // Warranty mode: "equipment" (Otis fleet) or "serial" (Zurn lookup)
        Set(varWarrantyMode, Coalesce(varWarrantyMode, "equipment"))
    Children:
      # -- Orange accent bar --
      - rectHomeBar:
          Control: Rectangle

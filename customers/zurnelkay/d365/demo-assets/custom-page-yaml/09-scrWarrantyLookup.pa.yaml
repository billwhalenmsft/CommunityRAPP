      - lblResWEndLbl:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =20
            Size: =11
            Text: ="Warr. End"
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0
            Width: =100
            X: =24
            Y: =355
      - lblResWEndVal:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Semibold
            Height: =20
            Size: =11
            Text: |-
              =If(
                  IsBlank(First(colSerialResult).'Warranty End'),
                  "—",
                  Text(First(colSerialResult).'Warranty End', "mm/dd/yyyy")
              )
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0
            Width: =Parent.Width - 148
            X: =128
            Y: =355
      - lblWarrStatus:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: |-
              =If(
                  IsBlank(First(colSerialResult).'Warranty End'),
                  RGBA(97, 96, 96, 1),
                  If(
                      DateDiff(Today(), First(colSerialResult).'Warranty End', TimeUnit.Days) > 0,
                      RGBA(16, 124, 16, 1),
                      RGBA(197, 54, 1, 1)
                  )
              )
            Fill: |-
              =If(
                  IsBlank(First(colSerialResult).'Warranty End'),
                  RGBA(237, 235, 233, 1),
                  If(
                      DateDiff(Today(), First(colSerialResult).'Warranty End', TimeUnit.Days) > 0,
                      RGBA(223, 246, 221, 1),
                      RGBA(253, 231, 233, 1)
                  )
              )
            FontWeight: =FontWeight.Bold
            Height: =93
            Size: =10
            Text: |-
              =If(
                  IsBlank(First(colSerialResult).'Warranty End'),
                  "NO WARRANTY",
                  If(
                      DateDiff(Today(), First(colSerialResult).'Warranty End', TimeUnit.Days) > 0,
                      "ACTIVE",
                      "EXPIRED"
                  )
              )
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0
            Width: =101
            X: =256
            Y: =282
      - rectClaimDivider:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(237, 235, 233, 1)
            Height: =1
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0 && !varClaimSubmitted
            Width: =Parent.Width - 32
            X: =16
            Y: =396
      - lblClaimSection:
          Control: Label@2.5.1
          Properties:
            Color: |-
              =If(varActionMessage <> "", RGBA(16, 124, 16, 1), RGBA(0, 78, 140, 1))
            FontWeight: =FontWeight.Semibold
            Height: =22
            Size: =12
            Text: |-
              =If(
                  varActionMessage <> "", varActionMessage,
                  If(varShowClaimForm, "File a Warranty Claim",
                      If(varShowClaimHistory, "Claim History",
                          If(varWarrantyActive, "Warranty Actions", "Service Options")
                      )
                  )
              )
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0 && !varClaimSubmitted
            Width: =Parent.Width - 32
            X: =16
            Y: =404
      - btnProcessClaim:
          Control: Classic/Button@2.2.0
          Properties:
            BorderThickness: =0
            Color: =RGBA(255, 255, 255, 1)
            Fill: =RGBA(0, 78, 140, 1)
            FontWeight: =FontWeight.Bold
            Height: =38
            HoverFill: =RGBA(0, 58, 120, 1)
            OnSelect: |-
              =Set(varShowClaimForm, true);
              Set(varActionMessage, "")
            PressedFill: =RGBA(0, 38, 100, 1)
            Size: =12
            Text: ="Process Warranty Claim"
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0 && !varShowClaimForm && !varShowClaimHistory && !varClaimSubmitted && varWarrantyActive
            Width: =Parent.Width - 32
            X: =16
            Y: =430
      - btnSendReplacement:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 78, 140, 1)
            BorderThickness: =1
            Color: =RGBA(0, 78, 140, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Height: =38
            HoverFill: =RGBA(0, 78, 140, 0.05)
            OnSelect: |-
              =Patch(
                  'Email Activities',
                  Defaults('Email Activities'),
                  {
                      Subject: "Replacement Part — " & First(colSerialResult).'Product Name' & " — SN: " & First(colSerialResult).'Serial ID',
                      Description: "<html><body style='font-family:Segoe UI,sans-serif;font-size:14px;color:#333'>"
                          & "<p>A replacement part has been initiated for the following product under active warranty:</p>"
                          & "<table style='border-collapse:collapse;margin:12px 0'>"
                          & "<tr><td style='padding:4px 12px 4px 0;color:#666'>Product:</td><td style='padding:4px 0;font-weight:600'>" & First(colSerialResult).'Product Name' & "</td></tr>"
                          & "<tr><td style='padding:4px 12px 4px 0;color:#666'>Serial:</td><td style='padding:4px 0;font-weight:600'>" & First(colSerialResult).'Serial ID' & "</td></tr>"
                          & "<tr><td style='padding:4px 12px 4px 0;color:#666'>Warranty Exp:</td><td style='padding:4px 0;font-weight:600'>" & Text(First(colSerialResult).'Warranty End', "mm/dd/yyyy") & "</td></tr>"
                          & "</table>"
                          & "<p>The replacement will be shipped to the customer address on file within <b>3-5 business days</b>.</p>"
                          & "<p>Please review this draft and send when ready.</p>"
                          & "</body></html>"
                  }
              );
              Set(varActionMessage, "✓ Replacement part email drafted")
            PressedFill: =RGBA(0, 78, 140, 0.1)
            Size: =12
            Text: ="Send Replacement Part"
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0 && !varShowClaimForm && !varShowClaimHistory && !varClaimSubmitted && varWarrantyActive
            Width: =Parent.Width - 32
            X: =16
            Y: =472
      - btnScheduleFieldSvc:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 78, 140, 1)
            BorderThickness: =1
            Color: =RGBA(0, 78, 140, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Height: =38
            HoverFill: =RGBA(0, 78, 140, 0.05)
            OnSelect: |-
              =Set(varActionMessage,
                  "✓ Field service scheduled for "
                  & Text(DateAdd(Today(), 3, TimeUnit.Days), "mm/dd/yyyy")
              )
            PressedFill: =RGBA(0, 78, 140, 0.1)
            Size: =12
            Text: ="Schedule Field Service"
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0 && !varShowClaimForm && !varShowClaimHistory && !varClaimSubmitted && varWarrantyActive
            Width: =Parent.Width - 32
            X: =16
            Y: =514
      - btnGoodwillReplace:
          Control: Classic/Button@2.2.0
          Properties:
            BorderThickness: =0
            Color: =RGBA(255, 255, 255, 1)
            Fill: =RGBA(0, 78, 140, 1)
            FontWeight: =FontWeight.Bold
            Height: =38
            HoverFill: =RGBA(0, 58, 120, 1)
            OnSelect: =Set(varActionMessage, "✓ Goodwill replacement submitted for approval")
            PressedFill: =RGBA(0, 38, 100, 1)
            Size: =12
            Text: ="Offer Goodwill Replacement"
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0 && !varShowClaimForm && !varShowClaimHistory && !varClaimSubmitted && !varWarrantyActive
            Width: =Parent.Width - 32
            X: =16
            Y: =430
      - btnPaidRepairQuote:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 78, 140, 1)
            BorderThickness: =1
            Color: =RGBA(0, 78, 140, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Height: =38
            HoverFill: =RGBA(0, 78, 140, 0.05)
            OnSelect: |-
              =Patch(
                  'Email Activities',
                  Defaults('Email Activities'),
                  {
                      Subject: "Paid Repair Quote — " & First(colSerialResult).'Product Name' & " — SN: " & First(colSerialResult).'Serial ID',
                      Description: "<html><body style='font-family:Segoe UI,sans-serif;font-size:14px;color:#333'>"
                          & "<p>Your product warranty has expired, but we are happy to help with a paid repair option.</p>"
                          & "<table style='border-collapse:collapse;margin:12px 0'>"
                          & "<tr><td style='padding:4px 12px 4px 0;color:#666'>Product:</td><td style='padding:4px 0;font-weight:600'>" & First(colSerialResult).'Product Name' & "</td></tr>"
                          & "<tr><td style='padding:4px 12px 4px 0;color:#666'>Serial:</td><td style='padding:4px 0;font-weight:600'>" & First(colSerialResult).'Serial ID' & "</td></tr>"
                          & "<tr><td style='padding:4px 12px 4px 0;color:#666'>Warranty Expired:</td><td style='padding:4px 0;font-weight:600;color:#c53601'>" & Text(First(colSerialResult).'Warranty End', "mm/dd/yyyy") & "</td></tr>"
                          & "</table>"
                          & "<p><b>Estimated Repair Cost:</b> $485.00 (parts + labor)</p>"
                          & "<p>Please reply to approve or contact us with questions.</p>"
                          & "</body></html>"
                  }
              );
              Set(varActionMessage, "✓ Paid repair quote drafted — $485.00")
            PressedFill: =RGBA(0, 78, 140, 0.1)
            Size: =12
            Text: ="Create Paid Repair Quote"
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0 && !varShowClaimForm && !varShowClaimHistory && !varClaimSubmitted && !varWarrantyActive
            Width: =Parent.Width - 32
            X: =16
            Y: =472
      - btnTradeInUpgrade:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 78, 140, 1)
            BorderThickness: =1
            Color: =RGBA(0, 78, 140, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Height: =38
            HoverFill: =RGBA(0, 78, 140, 0.05)
            OnSelect: =Set(varActionMessage, "✓ Trade-in/upgrade offer sent to customer")
            PressedFill: =RGBA(0, 78, 140, 0.1)
            Size: =12
            Text: ="Offer Trade-In / Upgrade"
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0 && !varShowClaimForm && !varShowClaimHistory && !varClaimSubmitted && !varWarrantyActive
            Width: =Parent.Width - 32
            X: =16

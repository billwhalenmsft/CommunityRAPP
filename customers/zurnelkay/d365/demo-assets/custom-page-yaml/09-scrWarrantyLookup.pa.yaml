Screens:
  scrWarrantyLookup:
    Properties:
      Fill: =RGBA(250, 250, 250, 1)
      Height: =800
      OnVisible: |-
        =Set(varSerialSearched, false);
        Set(varClaimSubmitted, false);
        Set(varClaimError, "");
        Set(varShowClaimForm, false);
        Set(varWarrantyActive, false);
        Set(varActionMessage, "");
        Set(varShowClaimHistory, false);
        Clear(colSerialResult);
        Clear(colClaimHistory);
        // Auto-search if serial was passed from case form (parsed in scrHome)
        If(
            !IsBlank(varPassedSerial),
            ClearCollect(
                colSerialResult,
                Filter('Product Serials', 'Serial ID' = varPassedSerial)
            );
            Set(varSerialSearched, true);
            If(
                CountRows(colSerialResult) > 0 && !IsBlank(First(colSerialResult).'Warranty End'),
                Set(
                    varWarrantyActive,
                    DateDiff(Today(), First(colSerialResult).'Warranty End', TimeUnit.Days) > 0
                ),
                Set(varWarrantyActive, false)
            )
        )
      Width: =380
    Children:
      - rectWarrBar:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(0, 78, 140, 1)
            Height: =6
            Width: =Parent.Width
      - icoWarrIcon:
          Control: Classic/Icon@2.5.0
          Properties:
            Color: =RGBA(0, 78, 140, 1)
            Height: =32
            Icon: =Icon.Lock
            Width: =32
            X: =16
            Y: =18
      - lblWarrTitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Bold
            Height: =34
            Size: =20
            Text: ="Warranty Lookup"
            Width: =322
            X: =44
            Y: =16
      - lblWarrSubtitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(96, 94, 92, 1)
            Height: =22
            Size: =11
            Text: ="Search by serial number"
            Width: =Parent.Width - 74
            X: =51
            Y: =48
      - btnHomeIcon_5:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 120, 212, 1)
            BorderThickness: =1
            Color: =RGBA(0, 120, 212, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Height: =32
            OnSelect: =Navigate(scrHome, ScreenTransition.None)
            Size: =10
            Text: ="Home"
            Width: =52
            X: =Parent.Width - 68
            Y: =22
      - rectWarrDivider1:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(237, 235, 233, 1)
            Height: =1
            Width: =Parent.Width - 32
            X: =16
            Y: =78
      - lblSerialLbl:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Semibold
            Height: =18
            Size: =11
            Text: ="Serial Number"
            Width: =Parent.Width - 32
            X: =16
            Y: =88
      - txtSerialNum:
          Control: Classic/TextInput@2.3.2
          Properties:
            BorderColor: =RGBA(200, 198, 196, 1)
            Default: =varPassedSerial
            FocusedBorderColor: =RGBA(0, 78, 140, 1)
            Height: =36
            HintText: ="Enter serial number..."
            Size: =12
            Width: =Parent.Width - 32
            X: =16
            Y: =110
      - btnSerialSearch:
          Control: Classic/Button@2.2.0
          Properties:
            BorderThickness: =0
            Color: =RGBA(255, 255, 255, 1)
            DisabledFill: =RGBA(200, 198, 196, 1)
            DisplayMode: =If(Trim(txtSerialNum.Text) = "", DisplayMode.Disabled, DisplayMode.Edit)
            Fill: =RGBA(0, 78, 140, 1)
            FontWeight: =FontWeight.Bold
            Height: =36
            HoverFill: =RGBA(0, 58, 120, 1)
            OnSelect: |-
              =Set(varClaimSubmitted, false);
              Set(varClaimError, "");
              Set(varShowClaimForm, false);
              Set(varShowClaimHistory, false);
              Set(varActionMessage, "");
              ClearCollect(
                  colSerialResult,
                  Filter('Product Serials', 'Serial ID' = Trim(txtSerialNum.Text))
              );
              Set(varSerialSearched, true);
              If(
                  CountRows(colSerialResult) > 0 && !IsBlank(First(colSerialResult).'Warranty End'),
                  Set(
                      varWarrantyActive,
                      DateDiff(Today(), First(colSerialResult).'Warranty End', TimeUnit.Days) > 0
                  ),
                  Set(varWarrantyActive, false)
              )
            PressedFill: =RGBA(0, 38, 100, 1)
            Size: =12
            Text: ="Search"
            Width: =Parent.Width - 32
            X: =16
            Y: =154
      - rectWarrDivider2:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(237, 235, 233, 1)
            Height: =1
            Visible: =varSerialSearched
            Width: =Parent.Width - 32
            X: =16
            Y: =198
      - lblNotFound:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(97, 96, 96, 1)
            Size: =11
            Text: ="No serial number found matching '" & Trim(txtSerialNum.Text) & "'."
            Visible: =varSerialSearched && CountRows(colSerialResult) = 0
            Width: =Parent.Width - 32
            X: =16
            Y: =210
      - rectResultCard:

      - lblClaimDescLbl:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Semibold
            Height: =18
            Size: =11
            Text: ="Claim Description"
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0 && varShowClaimForm && !varClaimSubmitted
            Width: =Parent.Width - 32
            X: =16
            Y: =430
      - txtClaimDesc:
          Control: Classic/TextInput@2.3.2
          Properties:
            BorderColor: =RGBA(200, 198, 196, 1)
            FocusedBorderColor: =RGBA(0, 78, 140, 1)
            Height: =70
            HintText: ="Describe the issue or claim..."
            Mode: =TextMode.MultiLine
            Size: =11
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0 && varShowClaimForm && !varClaimSubmitted
            Width: =Parent.Width - 32
            X: =16
            Y: =452
      - btnSubmitClaim:
          Control: Classic/Button@2.2.0
          Properties:
            BorderThickness: =0
            Color: =RGBA(255, 255, 255, 1)
            DisabledFill: =RGBA(200, 198, 196, 1)
            DisplayMode: =If(Trim(txtClaimDesc.Text) = "", DisplayMode.Disabled, DisplayMode.Edit)
            Fill: =RGBA(0, 78, 140, 1)
            FontWeight: =FontWeight.Bold
            Height: =38
            HoverFill: =RGBA(0, 58, 120, 1)
            OnSelect: |-
              =Set(varClaimError, "");
              IfError(
                  Patch(
                      'Warranty Claims',
                      Defaults('Warranty Claims'),
                      {
                          'Product Serial': LookUp('Product Serials', 'Serial ID' = First(colSerialResult).'Serial ID'),
                          Description: txtClaimDesc.Text,
                          'Claim Date': Now()
                      }
                  );
                  Set(varClaimSubmitted, true);
                  Set(varShowClaimForm, false),
                  Set(varClaimError, "Error filing claim: " & FirstError.Message)
              )
            PressedFill: =RGBA(0, 38, 100, 1)
            Size: =12
            Text: ="Submit Claim"
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0 && varShowClaimForm && !varClaimSubmitted
            Width: =(Parent.Width - 40) / 2
            X: =16
            Y: =530
      - btnCancelClaim:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(200, 198, 196, 1)
            BorderThickness: =1
            Color: =RGBA(96, 94, 92, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Height: =38
            HoverFill: =RGBA(245, 245, 245, 1)
            OnSelect: =Set(varShowClaimForm, false)
            PressedFill: =RGBA(237, 235, 233, 1)
            Size: =12
            Text: ="Cancel"
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0 && varShowClaimForm && !varClaimSubmitted
            Width: =(Parent.Width - 40) / 2
            X: =(Parent.Width + 8) / 2
            Y: =530
      - lblClaimError:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(197, 54, 1, 1)
            Size: =11
            Text: =varClaimError
            Visible: =varClaimError <> ""

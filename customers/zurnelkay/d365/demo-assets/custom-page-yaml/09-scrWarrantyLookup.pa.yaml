          Properties:
            Fill: =RGBA(237, 235, 233, 1)
            Height: =1
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0 && !varShowClaimForm && !varShowClaimHistory && !varClaimSubmitted
            Width: =Parent.Width - 32
            X: =16
            Y: =556
      - btnLogFeedback:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 78, 140, 1)
            BorderThickness: =1
            Color: =RGBA(0, 78, 140, 1)

            Color: =RGBA(96, 94, 92, 1)
            Height: =20
            Size: =11
            Text: ="Product"
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0
            Width: =100
            X: =24
            Y: =214
      - lblResProdVal:

            Visible: =varSerialSearched && CountRows(colSerialResult) > 0 && !varShowClaimForm && !varShowClaimHistory && !varClaimSubmitted
            Width: =Parent.Width - 32
            X: =16
            Y: =564
      - btnViewHistory:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 78, 140, 1)
            BorderThickness: =1
            Color: =RGBA(0, 78, 140, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Height: =38
            HoverFill: =RGBA(0, 78, 140, 0.05)
            OnSelect: |-
              =ClearCollect(
                  colClaimHistory,
                  Filter(
                      'Warranty Claims',
                      'Product Serial'.'Serial ID' = First(colSerialResult).'Serial ID'
                  )
              );
              Set(varShowClaimHistory, true);
              Set(varActionMessage, "")
            PressedFill: =RGBA(0, 78, 140, 0.1)
            Size: =12
            Text: ="View Claim History"
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0 && !varShowClaimForm && !varShowClaimHistory && !varClaimSubmitted
            Width: =Parent.Width - 32

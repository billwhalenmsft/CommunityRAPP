            BorderColor: =RGBA(237, 235, 233, 1)
            BorderThickness: =1
            Fill: =RGBA(255, 255, 255, 1)
            Height: =180
            Visible: =varSerialSearched && CountRows(colSerialResult) > 0
            Width: =Parent.Width - 32
            X: =16
            Y: =206
      - lblResProdLbl:
          Control: Label@2.5.1

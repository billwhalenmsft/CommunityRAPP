#
#  HOW TO USE:
#   Option A  Гўв‚¬вЂњ Paste the entire Screens: block into your app's
#               pa.yaml (Git integration / source-code editing).
#   Option B  Гўв‚¬вЂњ Create screen manually, set its Properties, then
#               right-click screen ГўвЂ вЂ™ Paste code for each Children
#               block one control at a time.
#
#  SCREEN-LEVEL PROPERTIES (set on the screen itself):
#    Fill      ГўвЂ вЂ™ =RGBA(250, 250, 250, 1)
#    OnVisible ГўвЂ вЂ™ (see below)
# ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ

Screens:
  scrOrderLookup:
    Properties:
      Fill: =RGBA(250, 250, 250, 1)
      OnVisible: |-
        =Set(varSelectedOrder, Blank());
        Clear(colQtyChanges);
        Clear(colNewLines);
        Clear(colDateChanges);
        Set(varTimelineAdded, false);
        // Parse pipe-delimited recordId: accountId|caseId|accountName|serialNumber
        Set(varRawParam, Param("recordId"));
        If(
            !IsBlank(varRawParam) && !IsBlank(Find("|", varRawParam)),
            // Piped format вЂ” extract each segment
            Set(varAccountId, Left(varRawParam, Find("|", varRawParam) - 1));
            Set(varRemainder1, Mid(varRawParam, Find("|", varRawParam) + 1));
            Set(varCaseId,
                If(!IsBlank(Find("|", varRemainder1)),
                    Left(varRemainder1, Find("|", varRemainder1) - 1),
                    varRemainder1
                )
            );
            Set(varRemainder2,
                If(!IsBlank(Find("|", varRemainder1)),
                    Mid(varRemainder1, Find("|", varRemainder1) + 1),
                    ""
                )
            );
            Set(varAccountName,
                If(!IsBlank(Find("|", varRemainder2)),
                    Left(varRemainder2, Find("|", varRemainder2) - 1),
                    varRemainder2
                )
            );
            Set(varPassedSerial,
                If(!IsBlank(Find("|", varRemainder2)),
                    Mid(varRemainder2, Find("|", varRemainder2) + 1),
                    ""
                )
            ),
            // No pipes вЂ” backward compat (plain recordId)
            Set(varAccountId, varRawParam);
            Set(varCaseId, "");
            Set(varAccountName, "");
            Set(varPassedSerial, "")
        );
        // Look up case record if caseId was passed
        Set(varCaseRecord,
            If(!IsBlank(varCaseId),
                LookUp(Cases, Case = GUID(varCaseId))
            )
        )
    Children:
      # ГўвЂќв‚¬ГўвЂќв‚¬ Blue accent bar at top ГўвЂќв‚¬ГўвЂќв‚¬
      - rectTopBar:
          Control: Rectangle
          Properties:
            X: =0
            Y: =0
            Width: =Parent.Width
            Height: =6
            Fill: =RGBA(0, 120, 212, 1)

      # ГўвЂќв‚¬ГўвЂќв‚¬ Search icon ГўвЂќв‚¬ГўвЂќв‚¬
      - icoSearch:
          Control: Classic/Icon
          Properties:
            Icon: =Icon.Search
            X: =16
            Y: =24
            Width: =36
            Height: =36
            Color: =RGBA(0, 120, 212, 1)

      # -- Home button (top-right) --
      - btnHomeIcon:
          Control: Classic/Button
          Properties:
            Text: ="Home"
            X: =Parent.Width - 68
            Y: =22
            Width: =52
            Height: =32
            Size: =10
            Color: =RGBA(0, 120, 212, 1)
            Fill: =RGBA(255, 255, 255, 1)
            BorderColor: =RGBA(0, 120, 212, 1)
            BorderThickness: =1
            OnSelect: =Navigate(scrHome, ScreenTransition.None)

      # -- Screen title --
      - lblScreenTitle:
          Control: Label
          Properties:
            Text: ="Order Modification"
            X: =56
            Y: =24
            Width: =Parent.Width - 132
            Height: =40
            Size: =20
            FontWeight: =FontWeight.Bold
            Color: =RGBA(50, 49, 48, 1)

      # ГўвЂќв‚¬ГўвЂќв‚¬ Subtitle ГўвЂќв‚¬ГўвЂќв‚¬
      - lblSubtitle:
          Control: Label
          Properties:
            Text: ="Select the order to modify"
            X: =16
            Y: =68
            Width: =Parent.Width - 32
            Height: =28
            Size: =12
            Color: =RGBA(96, 94, 92, 1)

      # ГўвЂќв‚¬ГўвЂќв‚¬ Divider line ГўвЂќв‚¬ГўвЂќв‚¬
      - rectDivider1:
          Control: Rectangle
          Properties:
            X: =16
            Y: =100
            Width: =Parent.Width - 32
            Height: =1
            Fill: =RGBA(237, 235, 233, 1)

      # ГўвЂќв‚¬ГўвЂќв‚¬ Orders gallery (vertical, blank template) ГўвЂќв‚¬ГўвЂќв‚¬
      - galOrders:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            X: =0
            Y: =110
            Width: =Parent.Width
            Height: =Parent.Height - 110
            TemplateSize: =90
            TemplatePadding: =4
            Fill: =RGBA(250, 250, 250, 1)
            Items: |-
              =If(
                  IsBlank(varAccountId),
                  Filter(Orders, 'Status Reason' = 'Status Reason (Orders)'.New),
                  Filter(Orders,
                      'Status Reason' = 'Status Reason (Orders)'.New,
                      IsType(Customer, [@Accounts]) &&
                      AsType(Customer, [@Accounts]).Account = GUID(varAccountId)
                  )
              )
            OnSelect: |-
              =Set(varSelectedOrder, ThisItem);
              Navigate(scrOrderLineManagement, ScreenTransition.None)
          Children:
            # ГўвЂќв‚¬ГўвЂќв‚¬ Card background (blue border when selected) ГўвЂќв‚¬ГўвЂќв‚¬
            - rectOrderCard:
                Control: Rectangle
                Properties:
                  X: =8
                  Y: =4
                  Width: =Parent.TemplateWidth - 16
                  Height: =Parent.TemplateHeight - 8
                  Fill: =RGBA(255, 255, 255, 1)
                  BorderColor: =If(ThisItem.IsSelected, RGBA(0, 120, 212, 1), RGBA(237, 235, 233, 1))
                  BorderThickness: =If(ThisItem.IsSelected, 2, 1)
                  OnSelect: =Select(Parent)

            # ГўвЂќв‚¬ГўвЂќв‚¬ Order ID (bold, blue) ГўвЂќв‚¬ГўвЂќв‚¬
            - lblOrderId:
                Control: Label
                Properties:
                  Text: =ThisItem.'Order ID'
                  X: =24
                  Y: =12
                  Width: =180
                  Height: =28
                  Size: =14
                  FontWeight: =FontWeight.Bold
                  Color: =RGBA(0, 90, 158, 1)
                  OnSelect: =Select(Parent)

            # ГўвЂќв‚¬ГўвЂќв‚¬ Order name / description ГўвЂќв‚¬ГўвЂќв‚¬
            - lblOrderName:
                Control: Label
                Properties:
                  Text: =ThisItem.Name
                  X: =24
                  Y: =40
                  Width: =220
                  Height: =22
                  Size: =11
                  Color: =RGBA(96, 94, 92, 1)
                  OnSelect: =Select(Parent)

            # ГўвЂќв‚¬ГўвЂќв‚¬ Total amount (right-aligned) ГўвЂќв‚¬ГўвЂќв‚¬
            - lblOrderAmount:
                Control: Label
                Properties:
                  Text: |-
                    ="$" & Text(ThisItem.'Total Amount', "#,##0")
                  X: =Parent.TemplateWidth - 130
                  Y: =12
                  Width: =110
                  Height: =28
                  Size: =14
                  FontWeight: =FontWeight.Semibold
                  Align: =Align.Right
                  Color: =RGBA(50, 49, 48, 1)
                  OnSelect: =Select(Parent)

            # ГўвЂќв‚¬ГўвЂќв‚¬ Delivery date (right-aligned) ГўвЂќв‚¬ГўвЂќв‚¬
            - lblOrderDate:
                Control: Label
                Properties:
                  Text: =Text(ThisItem.'Date Fulfilled', "MMM d, yyyy")
                  X: =Parent.TemplateWidth - 130
                  Y: =40
                  Width: =110
                  Height: =22
                  Size: =10
                  Align: =Align.Right
                  Color: =RGBA(96, 94, 92, 1)
                  OnSelect: =Select(Parent)

# â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
#  SCREEN 2 â€” Line Management (scrOrderLineManagement)
#  Format: Power Apps pa.yaml SchemaV3
# â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

Screens:
  scrOrderLineManagement:
    Properties:
      Fill: =RGBA(250, 250, 250, 1)
      OnVisible: |-
        =Clear(colQtyChanges);
        Clear(colNewLines);
        Clear(colDateChanges);
        Set(varShowAddLine, false)
    Children:
      # â”€â”€ Orange accent bar â”€â”€
      - rectTopBar2:
          Control: Rectangle
          Properties:
            X: =0
            Y: =0
            Width: =Parent.Width
            Height: =6
            Fill: =RGBA(216, 59, 1, 1)

      # â”€â”€ Edit icon â”€â”€
      - icoEdit:
          Control: Classic/Icon
          Properties:
            Icon: =Icon.Edit
            X: =16
            Y: =20
            Width: =32
            Height: =32
            Color: =RGBA(216, 59, 1, 1)

      # â”€â”€ PO number title â”€â”€
      - lblPOTitle:
          Control: Label
          Properties:
            Text: ="PO " & varSelectedOrder.'Order ID'
            X: =52
            Y: =18
            Width: =Parent.Width - 68
            Height: =30
            Size: =16
            FontWeight: =FontWeight.Bold
            Color: =RGBA(50, 49, 48, 1)

      # â”€â”€ Customer name â”€â”€
      - lblCustomerName:
          Control: Label
          Properties:
            Text: |-
              =If(
                  IsType(varSelectedOrder.Customer, Accounts),
                  AsType(varSelectedOrder.Customer, Accounts).'Account Name',
                  ""
              )
            X: =52
            Y: =48
            Width: =Parent.Width - 68
            Height: =24
            Size: =12
            Color: =RGBA(96, 94, 92, 1)

      # â”€â”€ Divider â”€â”€
      - rectDivider2:
          Control: Rectangle
          Properties:
            X: =16
            Y: =78
            Width: =Parent.Width - 32
            Height: =1
            Fill: =RGBA(237, 235, 233, 1)

      # â”€â”€ Instruction text â”€â”€
      - lblInstructions:
          Control: Label
          Properties:
            Text: ="Adjust quantities per line. Tap + Add Line for new items."
            X: =16
            Y: =84
            Width: =Parent.Width - 32
            Height: =28
            Size: =11
            Italic: =true
            Color: =RGBA(96, 94, 92, 1)

      # â”€â”€ Line items gallery â”€â”€
      - galLineItems:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            X: =0
            Y: =116
            Width: =Parent.Width
            Height: =If(varShowAddLine, Parent.Height - 476, Parent.Height - 336)
            TemplateSize: =120
            TemplatePadding: =4
            Fill: =RGBA(250, 250, 250, 1)
            Items: |-
              =Filter(
                  'Order Lines',
                  Order.Order = varSelectedOrder.Order
              )
          Children:
            # â”€â”€ Row card background (pink when cancelled) â”€â”€
            - rectLineCard:
                Control: Rectangle
                Properties:
                  X: =8
                  Y: =4
                  Width: =Parent.TemplateWidth - 16
                  Height: =Parent.TemplateHeight - 8
                  Fill: |-
                    =With(
                        { change: LookUp(colQtyChanges, OrderProduct = ThisItem.'Order Product') },
                        If(
                            !IsBlank(change) && change.NewQty < change.OrigQty,
                            RGBA(253, 231, 233, 1),
                            !IsBlank(change) && change.NewQty > change.OrigQty,
                            RGBA(223, 246, 221, 1),
                            RGBA(255, 255, 255, 1)
                        )
                    )
                  BorderColor: =RGBA(237, 235, 233, 1)
                  BorderThickness: =1

            # â”€â”€ Line number pill (blue badge) â”€â”€
            - lblLineNum:
                Control: Label
                Properties:
                  Text: ="Ln " & ThisItem.'Line Item Number'
                  X: =16
                  Y: =10
                  Width: =48
                  Height: =24
                  Size: =10
                  FontWeight: =FontWeight.Bold
                  Align: =Align.Center
                  Color: =RGBA(0, 90, 158, 1)
                  Fill: =RGBA(222, 236, 249, 1)

            # â”€â”€ Product description (bold) â”€â”€
            - lblProductDesc:
                Control: Label
                Properties:
                  Text: =ThisItem.'Product Name'
                  X: =72
                  Y: =10
                  Width: =Parent.TemplateWidth - 88
                  Height: =24
                  Size: =12
                  FontWeight: =FontWeight.Semibold
                  Color: =RGBA(50, 49, 48, 1)
                  Overflow: =Overflow.Hidden

            # â”€â”€ Quantity x unit price â”€â”€
            - lblQtyPrice:
                Control: Label
                Properties:
                  Text: |-
                    =ThisItem.Quantity & " x $" & Text(ThisItem.'Price Per Unit', "#,##0.00")
                  X: =72
                  Y: =36
                  Width: =180
                  Height: =20
                  Size: =11
                  Color: =RGBA(96, 94, 92, 1)

            # â”€â”€ Extended amount (strikethrough when cancelled) â”€â”€
            - lblExtAmt:
                Control: Label
                Properties:
                  Text: |-
                    ="$" & Text(ThisItem.'Extended Amount', "#,##0.00")
                  X: =Parent.TemplateWidth - 130
                  Y: =36
                  Width: =114
                  Height: =20
                  Size: =12
                  FontWeight: =FontWeight.Semibold
                  Align: =Align.Right
                  Color: =RGBA(50, 49, 48, 1)
                  Strikethrough: |-
                    =!IsBlank(
                        LookUp(
                            colQtyChanges,
                            OrderProduct = ThisItem.'Order Product' && NewQty = 0
                        )
                    )

            # ── "Qty:" label ──
            - lblQtyLabel:
                Control: Label
                Properties:
                  Text: ="Qty:"
                  X: =16
                  Y: =70
                  Width: =36
                  Height: =24
                  Size: =11
                  FontWeight: =FontWeight.Semibold
                  Color: =RGBA(50, 49, 48, 1)

            # â"€â"€ Adjusted quantity input â"€â"€
            - txtAdjustQty:
                Control: Classic/TextInput
                Properties:
                  Default: =ThisItem.Quantity
                  X: =54
                  Y: =66
                  Width: =56
                  Height: =32
                  Size: =11
                  Align: =Align.Center
                  Color: =RGBA(50, 49, 48, 1)
                  Fill: =RGBA(255, 255, 255, 1)
                  BorderColor: =RGBA(200, 198, 196, 1)
                  Format: =TextFormat.Number
                  OnChange: |-
                    =RemoveIf(colQtyChanges, OrderProduct = ThisItem.'Order Product');
                    If(
                        Value(Self.Text) <> ThisItem.Quantity,
                        Collect(
                            colQtyChanges,
                            {
                                LineRecord: ThisItem,
                                OrderProduct: ThisItem.'Order Product',
                                OrigQty: ThisItem.Quantity,
                                NewQty: Max(Value(Self.Text), 0),
                                Delta: Max(Value(Self.Text), 0) - ThisItem.Quantity,
                                AdjAmount: (Max(Value(Self.Text), 0) - ThisItem.Quantity) * ThisItem.'Price Per Unit',
                                ProductName: ThisItem.'Product Name',
                                LineNum: ThisItem.'Line Item Number'
                            }
                        )
                    )

            # ── Delta indicator ──
            - lblQtyDelta:
                Control: Label
                Properties:
                  Text: |-
                    =With(
                        { change: LookUp(colQtyChanges, OrderProduct = ThisItem.'Order Product') },
                        If(
                            IsBlank(change), "was " & ThisItem.Quantity,
                            change.Delta > 0, "+" & change.Delta & " (was " & ThisItem.Quantity & ")",
                            change.Delta < 0, Text(change.Delta) & " (was " & ThisItem.Quantity & ")",
                            "was " & ThisItem.Quantity
                        )
                    )
                  X: =112
                  Y: =70
                  Width: =120
                  Height: =24
                  Size: =11
                  Color: |-
                    =With(
                        { change: LookUp(colQtyChanges, OrderProduct = ThisItem.'Order Product') },
                        If(
                            !IsBlank(change) && change.Delta < 0, RGBA(164, 38, 44, 1),
                            !IsBlank(change) && change.Delta > 0, RGBA(16, 124, 16, 1),
                            RGBA(96, 94, 92, 1)
                        )
                    )
                  FontWeight: |-
                    =If(
                        !IsBlank(LookUp(colQtyChanges, OrderProduct = ThisItem.'Order Product')),
                        FontWeight.Bold,
                        FontWeight.Normal
                    )

            # â"€â"€ Delivery date picker (hidden when fully cancelled) â"€â"€
            - dpDelivery:
                Control: Classic/DatePicker
                Properties:
                  X: =190
                  Y: =62
                  Width: =160
                  Height: =32
                  DefaultDate: =ThisItem.'Requested Delivery Date'
                  Size: =10
                  Visible: |-
                    =IsBlank(
                        LookUp(
                            colQtyChanges,
                            OrderProduct = ThisItem.'Order Product' && NewQty = 0
                        )
                    )
                  OnChange: |-
                    =Collect(
                        colDateChanges,
                        {
                            LineId: ThisItem.'Order Product',
                            NewDate: Self.SelectedDate
                        }
                    )

      # -- ADD LINE SECTION --

      - btnToggleAdd:
          Control: Classic/Button
          Properties:
            Text: =If(varShowAddLine, "- Hide Add Line", "+ Add Line Item")
            X: =16
            Y: =If(varShowAddLine, Parent.Height - 374, Parent.Height - 232)
            Width: =Parent.Width - 32
            Height: =30
            Size: =12
            FontWeight: =FontWeight.Semibold
            Color: =RGBA(0, 120, 212, 1)
            Fill: =RGBA(255, 255, 255, 1)
            BorderColor: =RGBA(0, 120, 212, 1)
            BorderThickness: =1
            OnSelect: =Set(varShowAddLine, !varShowAddLine)

      - txtNewProduct:
          Control: Classic/TextInput
          Properties:
            Default: =""
            HintText: ="Product name"
            X: =16
            Y: =Parent.Height - 338
            Width: =Parent.Width - 32
            Height: =36
            Size: =12
            BorderColor: =RGBA(200, 198, 196, 1)
            BorderThickness: =1
            Visible: =varShowAddLine

      - txtNewQty:
          Control: Classic/TextInput
          Properties:
            Default: =""
            HintText: ="Qty"
            Format: =TextFormat.Number
            X: =16
            Y: =Parent.Height - 296
            Width: =(Parent.Width - 40) / 2
            Height: =36
            Size: =12
            BorderColor: =RGBA(200, 198, 196, 1)
            BorderThickness: =1
            Visible: =varShowAddLine

      - txtNewPrice:
          Control: Classic/TextInput
          Properties:
            Default: =""
            HintText: ="Unit price"
            Format: =TextFormat.Number
            X: =(Parent.Width + 8) / 2
            Y: =Parent.Height - 296
            Width: =(Parent.Width - 40) / 2
            Height: =36
            Size: =12
            BorderColor: =RGBA(200, 198, 196, 1)
            BorderThickness: =1
            Visible: =varShowAddLine

      - btnAddItem:
          Control: Classic/Button
          Properties:
            Text: ="Add to Order"
            X: =16
            Y: =Parent.Height - 254
            Width: =Parent.Width - 32
            Height: =36
            Size: =12
            FontWeight: =FontWeight.Semibold
            Color: =RGBA(255, 255, 255, 1)
            Fill: =RGBA(16, 124, 16, 1)
            Visible: =varShowAddLine
            DisplayMode: |-
              =If(
                  !IsBlank(txtNewProduct.Text) && Value(txtNewQty.Text) > 0 && Value(txtNewPrice.Text) > 0,
                  DisplayMode.Edit,
                  DisplayMode.Disabled
              )
            OnSelect: |-
              =Collect(
                  colNewLines,
                  {
                      ProductName: txtNewProduct.Text,
                      Qty: Value(txtNewQty.Text),
                      UnitPrice: Value(txtNewPrice.Text),
                      LineAmount: Value(txtNewQty.Text) * Value(txtNewPrice.Text)
                  }
              );
              Reset(txtNewProduct);
              Reset(txtNewQty);
              Reset(txtNewPrice)

      - lblAddedCount:
          Control: Label
          Properties:
            Text: =CountRows(colNewLines) & " new line(s) added"
            X: =16
            Y: =Parent.Height - 214
            Width: =Parent.Width - 32
            Height: =20
            Size: =11
            Color: =RGBA(16, 124, 16, 1)
            FontWeight: =FontWeight.Bold
            Visible: =varShowAddLine && CountRows(colNewLines) > 0
      # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
      # FOOTER SECTION (below gallery)
      # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

      # â”€â”€ Footer background â”€â”€
      - rectFooterBg:
          Control: Rectangle
          Properties:
            X: =0
            Y: =Parent.Height - 170
            Width: =Parent.Width
            Height: =170
            Fill: =RGBA(255, 255, 255, 1)
            BorderColor: =RGBA(237, 235, 233, 1)
            BorderThickness: =1

      # â”€â”€ Orange top border on footer â”€â”€
      - rectFooterAccent:
          Control: Rectangle
          Properties:
            X: =0
            Y: =Parent.Height - 170
            Width: =Parent.Width
            Height: =3
            Fill: =RGBA(216, 59, 1, 1)

      # ── Qty adjustment summary ──
      - lblQtyAdjSummary:
          Control: Label
          Properties:
            Text: |-
              ="Adjusting " & CountRows(colQtyChanges) & " line(s): net " &
              If(Sum(colQtyChanges, AdjAmount) >= 0, "+", "") &
              "$" & Text(Sum(colQtyChanges, AdjAmount), "#,##0.00")
            X: =16
            Y: =Parent.Height - 160
            Width: =Parent.Width - 32
            Height: =22
            Size: =12
            FontWeight: =FontWeight.Bold
            Color: |-
              =If(
                  Sum(colQtyChanges, AdjAmount) < 0,
                  RGBA(164, 38, 44, 1),
                  RGBA(16, 124, 16, 1)
              )
            Visible: =CountRows(colQtyChanges) > 0

      # ── New lines summary (green) ──
      - lblNewLinesSummary:
          Control: Label
          Properties:
            Text: ="Adding " & CountRows(colNewLines) & " new line(s)"
            X: =16
            Y: =Parent.Height - 140
            Width: =Parent.Width - 32
            Height: =22
            Size: =12
            FontWeight: =FontWeight.Bold
            Color: =RGBA(16, 124, 16, 1)
            Visible: =CountRows(colNewLines) > 0

      # â”€â”€ Prompt text (shown when nothing selected) â”€â”€
      - lblNoChanges:
          Control: Label
          Properties:
            Text: ="Adjust quantities or add new lines"
            X: =16
            Y: =Parent.Height - 158
            Width: =Parent.Width - 32
            Height: =28
            Size: =12
            Color: =RGBA(96, 94, 92, 1)
            Visible: =CountRows(colQtyChanges) = 0 && CountRows(colNewLines) = 0

      # â”€â”€ Review Changes button (orange) â”€â”€
      - btnReview:
          Control: Classic/Button
          Properties:
            Text: ="Review Changes"
            X: =16
            Y: =Parent.Height - 120
            Width: =Parent.Width - 32
            Height: =44
            Size: =14
            FontWeight: =FontWeight.Semibold
            Color: =RGBA(255, 255, 255, 1)
            Fill: =RGBA(216, 59, 1, 1)
            DisplayMode: |-
              =If(
                  CountRows(colQtyChanges) > 0 || CountRows(colNewLines) > 0,
                  DisplayMode.Edit,
                  DisplayMode.Disabled
              )
            OnSelect: =Navigate(scrReview, ScreenTransition.None)

      # â”€â”€ Back button (outlined blue) â”€â”€
      - btnBack1:
          Control: Classic/Button
          Properties:
            Text: ="Back to Orders"
            X: =16
            Y: =Parent.Height - 66
            Width: =Parent.Width - 32
            Height: =40
            Size: =12
            Color: =RGBA(0, 120, 212, 1)
            Fill: =RGBA(255, 255, 255, 1)
            BorderColor: =RGBA(0, 120, 212, 1)
            BorderThickness: =1
            OnSelect: =Navigate(scrOrderLookup, ScreenTransition.None)

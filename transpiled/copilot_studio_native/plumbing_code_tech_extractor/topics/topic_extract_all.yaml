kind: AdaptiveDialog
id: topic_extract_all
displayName: Extract All
triggers:
- kind: OnRecognizedIntent
  intent: extract_all
  triggerQueries:
  - extract all
  - run extract all
  - execute extract all
actions:
- kind: InvokeFlowAction
  flowId: flow_extract_all
  inputs:
    action: extract_all
  outputs:
    result: flowResult
- kind: SendMessage
  message: ${flowResult}

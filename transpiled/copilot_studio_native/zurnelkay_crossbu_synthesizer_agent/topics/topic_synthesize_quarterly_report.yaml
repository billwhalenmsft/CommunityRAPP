kind: AdaptiveDialog
id: topic_synthesize_quarterly_report
displayName: Synthesize Quarterly Report
triggers:
- kind: OnRecognizedIntent
  intent: synthesize_quarterly_report
  triggerQueries:
  - synthesize quarterly report
  - run synthesize quarterly report
  - execute synthesize quarterly report
actions:

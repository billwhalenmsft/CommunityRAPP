<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48">
  <rect width="200" height="48" fill="#484644" rx="3"/>
  <!-- Gear icon (left) -->
  <g transform="translate(16,24) scale(0.7)">
    <circle cx="0" cy="0" r="7" fill="none" stroke="#C8C6C4" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="2.5" fill="#C8C6C4"/>
    <!-- gear teeth -->
    <rect x="-2" y="-13" width="4" height="5" rx="1" fill="#C8C6C4"/>
    <rect x="-2" y="8"  width="4" height="5" rx="1" fill="#C8C6C4"/>
    <rect x="8"  y="-2" width="5" height="4" rx="1" fill="#C8C6C4"/>
    <rect x="-13" y="-2" width="5" height="4" rx="1" fill="#C8C6C4"/>
    <rect x="5.7" y="-10.5" width="4" height="5" rx="1" transform="rotate(45)" fill="#C8C6C4"/>
    <rect x="5.7" y="-10.5" width="4" height="5" rx="1" transform="rotate(135)" fill="#C8C6C4"/>
    <rect x="5.7" y="-10.5" width="4" height="5" rx="1" transform="rotate(225)" fill="#C8C6C4"/>
    <rect x="5.7" y="-10.5" width="4" height="5" rx="1" transform="rotate(315)" fill="#C8C6C4"/>
  </g>
  <text x="52" y="27" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600"
        fill="#C8C6C4" letter-spacing="1">MANUFACTURER</text>
  <text x="52" y="40" font-family="Arial,Helvetica,sans-serif" font-size="9"
        fill="#8A8886" letter-spacing="0.5">No brand identified</text>
</svg>
